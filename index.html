<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>乐理大师</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
            background: #f2f2f7;
            overflow: hidden;
            color: #1c1c1e;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
        }

        /* ─── Header ─── */
        .header {
            flex-shrink: 0;
            padding: 14px 20px 10px;
            background: #fff;
            border-bottom: 0.5px solid #e5e5ea;
            text-align: center;
            position: relative;
        }
        .header h1 { font-size: 17px; font-weight: 600; }
        .stats { display: flex; justify-content: center; gap: 8px; margin-top: 5px; }
        .badge { font-size: 12px; color: #8e8e93; background: #f2f2f7; padding: 2px 10px; border-radius: 10px; }
        .badge.good { color: #34c759; }
        .badge.bad  { color: #ff3b30; }
        .config-btn {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px;
            color: #8e8e93;
        }

        /* ─── Chat ─── */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 14px 14px 6px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }
        .message {
            max-width: 76%;
            padding: 9px 13px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
            animation: fadeIn .2s ease;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
        .message.master   { background:#f2f2f7; color:#1c1c1e; align-self:flex-start; border-bottom-left-radius:4px; }
        .message.user     { background:#1c1c1e; color:#fff;    align-self:flex-end;   border-bottom-right-radius:4px; }
        .message.correct  { background:#e8f8ef; color:#1a7f45; align-self:flex-start; border-bottom-left-radius:4px; font-weight:500; }
        .message.incorrect{ background:#fff0ef; color:#c0392b; align-self:flex-start; border-bottom-left-radius:4px; font-weight:500; }

        /* ─── Input Area ─── */
        .input-area {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-top: 0.5px solid #e5e5ea;
            background: #fff;
            /* 底部间距由 JS 动态设置，此处仅作 fallback */
        }

        /* 麦克风开关 */
        .mic-toggle {
            flex-shrink: 0;
            width: 38px; height: 38px;
            border-radius: 50%;
            background: #f2f2f7;
            border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 17px;
            transition: background .15s;
        }
        .mic-toggle.on { background: #1c1c1e; }
        .mic-toggle.on .mic-icon path,
        .mic-toggle.on .mic-icon rect { fill: #fff; }
        .mic-toggle.on .mic-icon line,
        .mic-toggle.on .mic-icon path[stroke] { stroke: #fff; }

        /* 文字输入框 */
        .text-input-wrap {
            flex: 1;
            height: 40px;
            border-radius: 20px;
            border: 1.5px solid #e5e5ea;
            background: #f9f9f9;
            overflow: hidden;
            transition: border-color .2s;
        }
        .text-input-wrap:focus-within { border-color: #1c1c1e; background: #fff; }
        input[type="text"] {
            width: 100%; height: 100%;
            padding: 0 14px;
            border: none; background: transparent;
            font-size: 16px; color: #1c1c1e; outline: none; font-family: inherit;
        }
        input[type="text"]::placeholder { color: #aeaeb2; }

        /* 语音录音大按钮（语音模式下替换输入框） */
        .voice-record-btn {
            flex: 1;
            height: 40px;
            border-radius: 20px;
            border: 1.5px solid #e5e5ea;
            background: #f9f9f9;
            font-size: 14px; color: #8e8e93;
            cursor: pointer;
            display: none; /* 默认隐藏，语音模式显示 */
            align-items: center; justify-content: center;
            user-select: none; -webkit-user-select: none;
            touch-action: none;
            transition: background .15s, color .15s, border-color .15s;
        }
        .voice-record-btn.recording {
            background: #fff0ef; border-color: #ff3b30; color: #ff3b30;
        }

        /* 发送按钮 */
        .send-btn {
            flex-shrink: 0;
            width: 38px; height: 38px;
            border-radius: 50%;
            background: #1c1c1e; color: #fff;
            border: none; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity .15s;
        }
        .send-btn:active { opacity: .7; }

        /* 语音模式切换显示 */
        .app.voice-mode .text-input-wrap { display: none; }
        .app.voice-mode .voice-record-btn { display: flex; }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="header">
        <h1>乐理大师</h1>
        <button class="config-btn" id="configBtn" title="AI 配置">⚙️</button>
        <div class="stats">
            <span class="badge good">✓ <span id="sc">0</span></span>
            <span class="badge bad">✗ <span id="si">0</span></span>
            <span class="badge">准确率 <span id="sa">—</span></span>
        </div>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <div class="input-area" id="inputArea">
        <!-- 麦克风开关 -->
        <button class="mic-toggle" id="micToggle" title="语音模式">
            <svg class="mic-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="9" y="2" width="6" height="12" rx="3" fill="#1c1c1e"/>
                <path d="M5 11a7 7 0 0 0 14 0" stroke="#1c1c1e" stroke-width="1.8" stroke-linecap="round"/>
                <line x1="12" y1="18" x2="12" y2="22" stroke="#1c1c1e" stroke-width="1.8" stroke-linecap="round"/>
                <line x1="9" y1="22" x2="15" y2="22" stroke="#1c1c1e" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
        </button>

        <!-- 文字输入框 -->
        <div class="text-input-wrap">
            <input type="text" id="userInput"
                   placeholder="输入答案，或说「换题型」「加难」…"
                   autocomplete="off" autocorrect="off" autocapitalize="off" />
        </div>

        <!-- 语音录音按钮（语音模式专用，替换输入框） -->
        <button class="voice-record-btn" id="voiceRecordBtn">按住说话</button>

        <!-- 发送 -->
        <button class="send-btn" id="sendBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
                <path d="M12 3 L21 20 L12 16 L3 20 Z"/>
            </svg>
        </button>
    </div>
</div>

<script>
// ═══════════════════════════════════════════
//  底部间距自适应（tiiny广告条 + 安全区）
// ═══════════════════════════════════════════
function setBottomPadding() {
    const safeBottom = parseInt(getComputedStyle(document.documentElement)
        .getPropertyValue('--sab') || '0', 10);

    // tiiny广告条约48px；桌面端不需要额外空间
    const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
    const tinyBar = isMobile ? 52 : 0;
    const safe    = isMobile ? (window.safeAreaBottom || 0) : 0;

    document.getElementById('inputArea').style.paddingBottom =
        (10 + tinyBar + safe) + 'px';
}

// 读取 CSS env(safe-area-inset-bottom) 的实际像素值
const safeDiv = document.createElement('div');
safeDiv.style.cssText = 'position:fixed;bottom:0;height:env(safe-area-inset-bottom,0px);width:0;pointer-events:none;';
document.body.appendChild(safeDiv);
window.addEventListener('load', () => {
    window.safeAreaBottom = safeDiv.offsetHeight || 0;
    document.body.removeChild(safeDiv);
    setBottomPadding();
});
window.addEventListener('resize', setBottomPadding);

// ═══════════════════════════════════════════
//  乐理知识库
// ═══════════════════════════════════════════
const CHROMATIC = ['C','#C','D','#D','E','F','#F','G','#G','A','#A','B'];
const SOLMIZATION_TO_NOTE = {
    '1':'C','#1':'#C','b1':'B','2':'D','#2':'#D','b2':'#C',
    '3':'E','#3':'F', 'b3':'#D','4':'F','#4':'#F','b4':'E',
    '5':'G','#5':'#G','b5':'#F','6':'A','#6':'#A','b6':'#G',
    '7':'B','#7':'C', 'b7':'#A'
};
// 等音映射（包含重升等情况）
const ENHARMONIC_FULL = {
    // 单升降
    '#C':'bD','bD':'#C','#D':'bE','bE':'#D','#F':'bG','bG':'#F',
    '#G':'bA','bA':'#G','#A':'bB','bB':'#A',
    // 重升（x / ##）= 午音名
    '##C':'D','xC':'D','##D':'E','xD':'E','##E':'#F','xE':'#F',
    '##F':'G','xF':'G','##G':'A','xG':'A','##A':'B','xA':'B',
    '##B':'#C','xB':'#C',
    // 重降 (bb) = 呢音名
    'bbD':'C','bbE':'D','bbF':'E','bbG':'F','bbA':'G','bbB':'A','bbC':'B'
};

function allEnharmonics(note) {
    const set = new Set([note]);
    // 直接等音
    if (ENHARMONIC_FULL[note]) set.add(ENHARMONIC_FULL[note]);
    // 通过钢琴中音名展开
    for (const [k,v] of Object.entries(ENHARMONIC_FULL)) { if (v===note) set.add(k); }
    // 如果是升号，也加入募小、重升等形式
    return set;
}
const SCALES = {
    '大调':[0,2,4,5,7,9,11],'自然小调':[0,2,3,5,7,8,10],
    '和声小调':[0,2,3,5,7,8,11],'旋律小调':[0,2,3,5,7,9,11],
    '五声音阶':[0,2,4,7,9],'多利亚调式':[0,2,3,5,7,9,10],
    '弗里几亚调式':[0,1,3,5,7,8,10],'利底亚调式':[0,2,4,6,7,9,11],
    '混合利底亚':[0,2,4,5,7,9,10],'洛克里亚调式':[0,1,3,5,6,8,10]
};
const CHORDS = {
    '大三和弦':[0,4,7],'小三和弦':[0,3,7],'减三和弦':[0,3,6],
    '增三和弦':[0,4,8],'挂留四和弦':[0,5,7],
    '属七和弦':[0,4,7,10],'大七和弦':[0,4,7,11],'小七和弦':[0,3,7,10],
    '减七和弦':[0,3,6,9],'半减七和弦':[0,3,6,10],'小大七和弦':[0,3,7,11]
};
const INTERVALS = {
    0:'同度',1:'小二度',2:'大二度',3:'小三度',4:'大三度',
    5:'纯四度',6:'增四度/减五度',7:'纯五度',8:'小六度',
    9:'大六度',10:'小七度',11:'大七度',12:'八度'
};

// ═══════════════════════════════════════════
//  状态
// ═══════════════════════════════════════════
let currentQuestion = null;
let difficulty = 2;
let questionType = 'all';
let lockedScale = null;  // {root:'C', type:'大调'} 锁定音阶
let lockedChord = null;  // '属七和弦' 锁定和弦类型
let stats = JSON.parse(localStorage.getItem('musicStats')) || {correct:0,incorrect:0};
let customQuestions = JSON.parse(localStorage.getItem('customQuestions')) || [];
let voiceMode = false;

// ═══════════════════════════════════════════
//  辅助函数
// ═══════════════════════════════════════════
function getNoteIndex(n) {
    let i = CHROMATIC.indexOf(n);
    if (i !== -1) return i;
    if (n.length === 2 && n[0] === 'b') {
        const b = CHROMATIC.indexOf(n[1].toUpperCase());
        if (b !== -1) return (b - 1 + 12) % 12;
    }
    return 0;
}
const getNoteName = i => CHROMATIC[((i%12)+12)%12];
const transposeNote = (n,s) => getNoteName(getNoteIndex(n)+s);
const getScaleNotes = (r,t) => SCALES[t].map(i=>transposeNote(r,i));
const getChordNotes = (r,t) => CHORDS[t].map(i=>transposeNote(r,i));
const randomNote = () => CHROMATIC[Math.floor(Math.random()*12)];
const randomChoice = a => a[Math.floor(Math.random()*a.length)];

function normToken(t) {
    t = t.trim().replace(/降/g,'b').replace(/升/g,'#');
    // 支持首调唱名：#4、1、b6
    const sm = t.match(/^([#b]?)([1-7])$/);
    if (sm) return SOLMIZATION_TO_NOTE[sm[1]+sm[2]] || t.toUpperCase();
    // 支持音名：[#b]?[A-G]
    const nm = t.match(/^([#b]{0,2})([A-Ga-g])$/);
    if (nm) return nm[1]+nm[2].toUpperCase();
    return t.toUpperCase();
}

// 解析答案字符串：支持有无空格隔开的形式，如 "#4#1#6" 或 "#F #A #C"
function splitAnswer(s) {
    s = s.trim().replace(/降/g,'b').replace(/升/g,'#');
    // 先尝试按空格分割
    if (/\s/.test(s)) return s.split(/\s+/);
    // 无空格：按 [#b]?[A-G1-7] 分割
    const tokens = [];
    const re = /([#b]{0,2})([A-Ga-g]|[1-7])/g;
    let m;
    while ((m = re.exec(s)) !== null) tokens.push(m[1]+(m[2]));
    return tokens.length > 0 ? tokens : [s];
}

function normalizeAnswer(s) {
    return splitAnswer(s).map(normToken).join(' ');
}
// notesEqual 直接复用 allEnharmonics
function notesEqual(a,b) {
    if (a===b) return true;
    const ea = allEnharmonics(a), eb = allEnharmonics(b);
    for (const x of ea) { if (eb.has(x)) return true; }
    // 转换为升号音名后再比对
    const an = SOLMIZATION_TO_NOTE[a]||a, bn = SOLMIZATION_TO_NOTE[b]||b;
    if (an===bn) return true;
    const ean = allEnharmonics(an), ebn = allEnharmonics(bn);
    for (const x of ean) { if (ebn.has(x)) return true; }
    return false;
}
function checkAnswer(raw) {
    if (!currentQuestion) return false;
    const u=normalizeAnswer(raw).split(' '), c=normalizeAnswer(currentQuestion.answer).split(' ');
    if (u.length!==c.length) return false;
    if (u.every((t,i)=>notesEqual(t,c[i]))) return true;
    if (u.length>1) {
        const su=[...u].sort(), sc=[...c].sort();
        if (su.every((t,i)=>notesEqual(t,sc[i]))) return true;
    }
    return false;
}

// ═══════════════════════════════════════════
//  出题
// ═══════════════════════════════════════════
function generateIntervalQuestion() {
    const note=randomNote(), dir=Math.random()>.5?'上行':'下行';
    const maxI=Math.min(12,2+difficulty*2), semi=Math.floor(Math.random()*maxI)+1;
    const answer=dir==='上行'?transposeNote(note,semi):transposeNote(note,-semi);
    return {question:`${note}${dir}${INTERVALS[semi]||semi+'个半音'}是什么音？`,answer};
}
function generateScaleQuestion() {
    const all=Object.keys(SCALES);
    // 如果锁定了音阶，始终用锁定的根音和类型
    const root = lockedScale ? lockedScale.root : randomNote();
    const st   = lockedScale ? lockedScale.type
                : difficulty<=2?'大调':difficulty<=3?randomChoice(['大调','自然小调','和声小调','五声音阶']):randomChoice(all);
    const deg=Math.floor(Math.random()*SCALES[st].length)+1;
    if (Math.random()>.5) {
        return {question:`${root}${st}第${deg}级音？`,answer:getScaleNotes(root,st)[deg-1]};
    }
    return {question:`${root}${st}的组成音？`,answer:getScaleNotes(root,st).join(' ')};
}
function generateChordQuestion() {
    const all=Object.keys(CHORDS);
    // 如果锁定了和弦类型，始终用锁定的类型
    const ct = lockedChord ? lockedChord
             : difficulty<=2?randomChoice(['大三和弦','小三和弦']):difficulty<=3?randomChoice(['大三和弦','小三和弦','减三和弦','增三和弦','属七和弦']):randomChoice(all);
    const root=randomNote();
    return {question:`${root}${ct}的组成音？`,answer:getChordNotes(root,ct).join(' ')};
}
function generateQuestion() {
    const types=['interval','scale','chord'];
    if (customQuestions.length>0) types.push('custom');
    const type=questionType==='all'?randomChoice(types):questionType;
    let q;
    if (type==='interval') q=generateIntervalQuestion();
    else if (type==='scale') q=generateScaleQuestion();
    else if (type==='chord') q=generateChordQuestion();
    else { const c=randomChoice(customQuestions); q={question:c.question,answer:c.answer}; }
    currentQuestion=q; return q.question;
}

// ═══════════════════════════════════════════
//  AI 配置
// ═══════════════════════════════════════════
let aiConfig = JSON.parse(localStorage.getItem('aiConfig') || 'null') || {
    baseUrl: 'https://api.openai.com/v1',
    apiKey: '',
    model: 'gpt-4o-mini'
};

function saveAiConfig() {
    localStorage.setItem('aiConfig', JSON.stringify(aiConfig));
}

// ── AI 配置弹窗 ──
function showAiConfigModal() {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';

    const box = document.createElement('div');
    box.style.cssText = 'background:#fff;border-radius:16px;padding:22px 20px;width:100%;max-width:400px;box-shadow:0 10px 40px rgba(0,0,0,.2);';
    box.innerHTML = `
        <h2 style="font-size:16px;font-weight:600;margin-bottom:4px;">AI 助手配置</h2>
        <p style="font-size:13px;color:#8e8e93;margin-bottom:16px;">配置后乐理大师就能听懂任何自然语言指令</p>

        <label style="font-size:13px;color:#3c3c43;font-weight:500;">服务商预设</label>
        <select id="aiPreset" style="width:100%;margin:6px 0 14px;padding:10px 12px;border:1.5px solid #e5e5ea;border-radius:10px;font-size:14px;background:#f9f9f9;outline:none;">
            <option value="openai">OpenAI (api.openai.com)</option>
            <option value="deepseek">DeepSeek (api.deepseek.com)</option>
            <option value="qwen">通义千问 (dashscope)</option>
            <option value="custom">自定义</option>
        </select>

        <label style="font-size:13px;color:#3c3c43;font-weight:500;">API Base URL</label>
        <input id="aiBaseUrl" type="text" value="${aiConfig.baseUrl}"
            style="width:100%;margin:6px 0 14px;padding:10px 12px;border:1.5px solid #e5e5ea;border-radius:10px;font-size:14px;background:#f9f9f9;outline:none;"
            placeholder="https://api.openai.com/v1" />

        <label style="font-size:13px;color:#3c3c43;font-weight:500;">API Key</label>
        <input id="aiKey" type="password" value="${aiConfig.apiKey}"
            style="width:100%;margin:6px 0 14px;padding:10px 12px;border:1.5px solid #e5e5ea;border-radius:10px;font-size:14px;background:#f9f9f9;outline:none;"
            placeholder="sk-..." />

        <label style="font-size:13px;color:#3c3c43;font-weight:500;">模型</label>
        <input id="aiModel" type="text" value="${aiConfig.model}"
            style="width:100%;margin:6px 0 20px;padding:10px 12px;border:1.5px solid #e5e5ea;border-radius:10px;font-size:14px;background:#f9f9f9;outline:none;"
            placeholder="gpt-4o-mini" />

        <div style="display:flex;gap:10px;">
            <button id="aiCancel" style="flex:1;padding:11px;border:1.5px solid #e5e5ea;border-radius:10px;background:#fff;font-size:15px;cursor:pointer;">取消</button>
            <button id="aiSave" style="flex:2;padding:11px;border:none;border-radius:10px;background:#1c1c1e;color:#fff;font-size:15px;font-weight:600;cursor:pointer;">保存</button>
        </div>
    `;

    const presets = {
        openai:   { url: 'https://api.openai.com/v1',                         model: 'gpt-4o-mini' },
        deepseek: { url: 'https://api.deepseek.com/v1',                        model: 'deepseek-chat' },
        qwen:     { url: 'https://dashscope.aliyuncs.com/compatible-mode/v1', model: 'qwen-turbo' },
        custom:   { url: '', model: '' }
    };

    overlay.appendChild(box);
    document.body.appendChild(overlay);

    const selPreset = box.querySelector('#aiPreset');
    const inpUrl    = box.querySelector('#aiBaseUrl');
    const inpKey    = box.querySelector('#aiKey');
    const inpModel  = box.querySelector('#aiModel');

    selPreset.addEventListener('change', () => {
        const p = presets[selPreset.value];
        if (p.url) inpUrl.value = p.url;
        if (p.model) inpModel.value = p.model;
    });

    box.querySelector('#aiCancel').addEventListener('click', () => overlay.remove());
    box.querySelector('#aiSave').addEventListener('click', () => {
        aiConfig.baseUrl = inpUrl.value.trim().replace(/\/$/, '');
        aiConfig.apiKey  = inpKey.value.trim();
        aiConfig.model   = inpModel.value.trim();
        saveAiConfig();
        overlay.remove();
        addMsg('✅ AI 配置已保存！现在我能听懂你说的任何话了。', 'master');
    });
}

// ═══════════════════════════════════════════
//  意图识别（快速本地路径 + LLM 深度理解）
// ═══════════════════════════════════════════

// 判断是否是纯音名答案（走本地快速路径，不需要 LLM）
function looksLikePureAnswer(t) {
    // 纯音名/首调音符，格式如：C、#F、bA、1、#4、b6，可多个空格分隔或无分隔
    return /^([#b]{0,2}[A-Ga-g1-7]\s*)+$/.test(t.trim());
}

// 本地快速 regex 兜底（只处理纯音名和极明确的单词指令）
function quickLocalIntent(t) {
    // 换题/跳过
    if (/^(换[一道题个]?|跳过|下一题|next|skip)$/i.test(t)) return {type:'next'};
    // 统计
    if (/^(统计|成绩|正确率)$/.test(t)) return {type:'stats'};
    // 帮助
    if (/^(帮助|help)$/i.test(t)) return {type:'help'};
    // 重置
    if (/^(重置|清空)$/.test(t)) return {type:'reset'};
    return null;
}

// LLM 意图解析
const INTENT_SYSTEM_PROMPT = `你是乐理大师App的意图解析器。用户会发送中文或英文消息，你需要判断用户意图并返回JSON。

可用题型：interval（音程）、scale（音阶/调式）、chord（和弦）、all（随机）
可用音阶：大调、自然小调、和声小调、旋律小调、五声音阶、多利亚调式、弗里几亚调式、利底亚调式、混合利底亚、洛克里亚调式
可用和弦：大三和弦、小三和弦、减三和弦、增三和弦、属七和弦、大七和弦、小七和弦、减七和弦、半减七和弦、小大七和弦
音名：C #C D #D E F #F G #G A #A B

返回以下JSON格式之一（不要有其他文字）：

{"type":"qtype","value":"interval"} // 切换到音程题
{"type":"qtype","value":"scale"}    // 切换到音阶题（随机调）
{"type":"qtype","value":"chord"}    // 切换到和弦题（随机类型）
{"type":"qtype","value":"all"}      // 随机题型
{"type":"qtypeFixed","scaleRoot":"C","scaleType":"大调"}  // 锁定练习特定音阶，之后持续出该调的题
{"type":"qtypeChord","chordType":"属七和弦"}  // 锁定练习特定和弦类型，之后持续出该类型
{"type":"difficulty","value":1}     // 1=简单 2=较易 3=中等 4=较难 5=困难
{"type":"difficultyDelta","delta":1}  // 相对难度 +1或-1
{"type":"next"}   // 换一题/跳过（保持当前锁定状态）
{"type":"stats"}  // 查看统计
{"type":"reset"}  // 重置统计
{"type":"help"}   // 帮助说明
{"type":"answer"} // 这是答案输入，不是指令
{"type":"unknown","reply":"..."}    // 无法理解，reply字段填写简短回复

规则（结合对话历史和当前状态综合判断）：
- "考我C大调""一直出C大调""只练C大调""继续C大调""C大调的题" → qtypeFixed，scaleRoot=C，scaleType=大调
- "考我A自然小调""练A小调" → qtypeFixed，scaleRoot=A，scaleType=自然小调（若未指定类型默认大调）
- "出属七和弦题""练属七和弦""一直出属七" → qtypeChord，chordType=属七和弦
- "7和弦""七和弦" → qtypeChord，chordType=属七和弦
- "换成音程题""只出音程" → qtype:interval（清除锁定）
- "随机出题""什么都行" → qtype:all（清除锁定）
- "简单一点""加难""难度3" → difficulty/difficultyDelta
- 用户说"我没让你换""继续之前的""不是这个调"等 → 结合历史判断用户真实意图，返回对应的qtypeFixed/qtypeChord
- 用户说"换一道""下一题"但没说换题型 → next（保持当前锁定）
- 用户输入看起来是音名答案（如C、#F、E等单个或多个音名）→ answer
- 如果是日常闲聊/问候 → unknown，reply里简短回复`;

async function callLLMIntent(userText) {
    if (!aiConfig.apiKey) return null;
    try {
        // 构建带状态的 system prompt
        const stateDesc = [
            currentQuestion ? `当前题目：「${currentQuestion.question}」` : '当前无进行中题目',
            lockedScale ? `已锁定音阶：${lockedScale.root}${lockedScale.type}` : '',
            lockedChord ? `已锁定和弦：${lockedChord}` : '',
            `题型：${questionType}，难度：${difficulty}`
        ].filter(Boolean).join('\n');

        const messages = [
            { role: 'system', content: INTENT_SYSTEM_PROMPT + '\n\n当前应用状态：\n' + stateDesc },
            // 带上最近 8 轮对话历史
            ...conversationHistory.slice(-8),
            { role: 'user', content: userText }
        ];

        const resp = await fetch(`${aiConfig.baseUrl}/chat/completions`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${aiConfig.apiKey}`
            },
            body: JSON.stringify({
                model: aiConfig.model,
                messages,
                max_tokens: 150,
                temperature: 0
            })
        });
        if (!resp.ok) return null;
        const data = await resp.json();
        const content = data.choices?.[0]?.message?.content?.trim();
        if (!content) return null;
        // 提取 JSON
        const jsonMatch = content.match(/\{[\s\S]*\}/);
        if (!jsonMatch) return null;
        return JSON.parse(jsonMatch[0]);
    } catch(e) {
        return null;
    }
}

let conversationHistory = []; // [{role:'user'|'assistant', content:'...'}]

function pushHistory(role, content) {
    conversationHistory.push({ role, content });
    // 保留最近 20 条，防止内存无限增长
    if (conversationHistory.length > 20) conversationHistory.splice(0, 2);
}

function handleIntent(intent) {
    const ln=['简单','较易','中等','较难','困难'];
    const tn={all:'全部',interval:'音程',scale:'音阶',chord:'和弦',custom:'自定义'};
    switch(intent.type) {
        case 'difficulty':
            difficulty = Math.max(1, Math.min(5, intent.value));
            addMsg(`难度→${ln[difficulty-1]}，继续：`,'master');
            setTimeout(askNew,400); return true;
        case 'difficultyDelta':
            difficulty = Math.max(1, Math.min(5, difficulty + (intent.delta||0)));
            addMsg(`难度→${ln[difficulty-1]}，继续：`,'master');
            setTimeout(askNew,400); return true;
        case 'qtype':
            questionType=intent.value;
            lockedScale = null;  // 切换题型时解除锁定
            lockedChord = null;
            addMsg(`好的，切换到${tn[questionType]}题：`,'master');
            setTimeout(askNew,400); return true;
        case 'next':
            currentQuestion=null; askNew(); return true;
        case 'stats': {
            const tot=stats.correct+stats.incorrect;
            addMsg(`共${tot}题，正确${stats.correct}，正确率${tot>0?Math.round(stats.correct/tot*100):0}%`,'master');
            return true;
        }
        case 'reset':
            if(confirm('重置统计？')){ stats={correct:0,incorrect:0}; updateStats(); addMsg('已重置','master'); }
            return true;
        case 'qtypeChord': {
            questionType = 'chord';
            const ct = intent.chordType;
            if (CHORDS[ct]) {
                lockedChord = ct;   // 锁定和弦类型
                lockedScale = null;
                addMsg(`好的，将一直出${ct}：`, 'master');
                setTimeout(askNew, 400);
            } else {
                lockedChord = null;
                addMsg(`好的，切换到和弦题！`, 'master');
                setTimeout(askNew, 400);
            }
            return true;
        }
        case 'qtypeFixed': {
            questionType = 'scale';
            const st = intent.scaleType || '大调';
            const root = intent.scaleRoot || randomNote();
            const validScale = SCALES[st] ? st : '大调';
            // 锁定音阶，之后每题都用这个调
            lockedScale = { root, type: validScale };
            lockedChord = null;
            addMsg(`好的，将一直出${root}${validScale}题：`, 'master');
            setTimeout(askNew, 400);
            return true;
        }
        case 'answer':
            return false; // 交给答案判断逻辑
        case 'unknown':
            if (intent.reply) addMsg(intent.reply, 'master');
            return true;
        case 'help':
            addMsg('你可以直接说：\n「考我C大调」「只出属七和弦」「音程题」「简单一点」「加难」「换一题」「统计」\n答案格式：C  #F  bA  或  1  #4  b6','master');
            return true;
        case 'addCustom':
            setTimeout(()=>{
                const q=prompt('题目内容：'); if(!q)return;
                const a=prompt('正确答案：'); if(!a)return;
                customQuestions.push({question:q,answer:a});
                localStorage.setItem('customQuestions',JSON.stringify(customQuestions));
                addMsg('已添加','master');
            },100); return true;
    }
    return false;
}

// 识别纠正意图：“你判断错”“应该是”“不对”等
function detectCorrection(t) {
    if (/判断错了|判错了|你错了|不对|有误|错误|应该是|正确的是|是[#b\w]+不是|纲正|更正|应该/.test(t)) {
        // 尝试从话语中提取用户给出的音名
        const notePattern = /([#bx]+)?([A-Ga-g])|([#b]+)?([1-7])/g;
        const found = [];
        let m;
        while ((m = notePattern.exec(t)) !== null) {
            if (m[1]!==undefined || m[2]) found.push((m[1]||'') + (m[2]||'').toUpperCase());
            else if (m[3]!==undefined || m[4]) found.push((m[3]||'') + (m[4]||''));
        }
        return { type: 'correction', suggestedNote: found[found.length - 1] || null, raw: t };
    }
    return null;
}

// 验证用户纲正是否正确
function handleCorrection(intent) {
    if (!currentQuestion) {
        addMsg('现在没有进行中的题目', 'master'); return true;
    }
    const userNote = intent.suggestedNote ? normToken(intent.suggestedNote) : null;
    const correctNote = normalizeAnswer(currentQuestion.answer);

    if (userNote && notesEqual(userNote, correctNote)) {
        // 用户给的答案与标准答案等音
        addMsg(`${userNote} 和 ${currentQuestion.answer} 是等音，我的答案没有错。下一题：`, 'master');
        setTimeout(askNew, 400);
    } else if (userNote) {
        // 用户提供了具体音名，但实际不等音
        addMsg(`${userNote} 与正确答案 ${currentQuestion.answer} 不等音，我的判断没错。记住了吗？下一题：`, 'master');
        setTimeout(askNew, 400);
    } else {
        // 没有提取到具体音名
        addMsg(`正确答案是 ${currentQuestion.answer}。下一题：`, 'master');
        setTimeout(askNew, 400);
    }
    return true;
}
function addMsg(text, type='master') {
    const area=document.getElementById('chatArea');
    const d=document.createElement('div');
    d.className=`message ${type}`; d.textContent=text;
    area.appendChild(d); area.scrollTop=area.scrollHeight;
    return d;
}
function updateStats() {
    document.getElementById('sc').textContent=stats.correct;
    document.getElementById('si').textContent=stats.incorrect;
    const tot=stats.correct+stats.incorrect;
    document.getElementById('sa').textContent=tot>0?Math.round(stats.correct/tot*100)+'%':'—';
    localStorage.setItem('musicStats',JSON.stringify(stats));
}
function askNew() { addMsg(generateQuestion(),'master'); }

async function processInput(text) {
    text=text.trim(); if(!text)return;
    addMsg(text,'user');

    // 1. 纠正意图（本地）
    const correction = detectCorrection(text);
    if (correction) { handleCorrection(correction); return; }

    // 2. 纯音名答案 → 直接判题（不走 LLM，无延迟）
    if (looksLikePureAnswer(text) && currentQuestion) {
        judgeAnswer(text); return;
    }

    // 3. 极明确单词指令 → 本地快速处理
    const quick = quickLocalIntent(text);
    if (quick) { handleIntent(quick); return; }

    // 4. 有 AI Key → 走 LLM 理解（带历史上下文）
    if (aiConfig.apiKey) {
        // 把用户话加入历史
        pushHistory('user', text);

        const thinkingMsg = addMsg('…', 'master');
        const intent = await callLLMIntent(text);
        thinkingMsg.remove();

        if (intent) {
            // 把 LLM 回复也加入历史（以便下次调用时 LLM 能回顾自己的判断）
            pushHistory('assistant', JSON.stringify(intent));

            if (intent.type === 'answer') {
                if (currentQuestion) { judgeAnswer(text); }
                else { askNew(); }
                return;
            }
            if (handleIntent(intent)) return;
        }
        if (!currentQuestion) { askNew(); return; }
        judgeAnswer(text);
        return;
    }

    // 5. 没有 AI Key → 提示配置
    if (!currentQuestion) { askNew(); return; }
    if (/^[#b\d\sA-Ga-g升降]+$/.test(text)) {
        judgeAnswer(text);
    } else {
        addMsg('配置 AI 后我能听懂任何自然语言指令。点击右上角 ⚙️ 配置，或直接输入音名答案。', 'master');
    }
}

function judgeAnswer(text) {
    if (!currentQuestion) return;
    if (checkAnswer(text)) {
        stats.correct++; addMsg('✓ 正确！', 'correct');
    } else {
        stats.incorrect++; addMsg(`✗ 错误，答案：${currentQuestion.answer}`, 'incorrect');
    }
    updateStats();
    setTimeout(askNew, 900);
}

// ═══════════════════════════════════════════
//  文字输入
// ═══════════════════════════════════════════
let composing = false;
const userInputEl = document.getElementById('userInput');

userInputEl.addEventListener('compositionstart', () => { composing = true; });
userInputEl.addEventListener('compositionend',   () => { composing = false; });

document.getElementById('sendBtn').addEventListener('click',()=>{
    if(voiceMode) return;
    processInput(userInputEl.value); userInputEl.value='';
});

userInputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !composing) {
        e.preventDefault();
        processInput(userInputEl.value);
        userInputEl.value = '';
    }
});

// ═══════════════════════════════════════════
//  麦克风开关
// ═══════════════════════════════════════════
document.getElementById('micToggle').addEventListener('click',()=>{
    voiceMode=!voiceMode;
    document.getElementById('micToggle').classList.toggle('on',voiceMode);
    document.getElementById('app').classList.toggle('voice-mode',voiceMode);
});

// ═══════════════════════════════════════════
//  语音录音（独立按钮，不含任何 input）
// ═══════════════════════════════════════════
let recognition = null;
let isRecording = false;
let gotResult = false; // 标记是否已收到识别结果

function resetRecBtn() {
    isRecording = false;
    const btn = document.getElementById('voiceRecordBtn');
    btn.classList.remove('recording');
    btn.textContent = '按住说话';
}

function buildSR() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    const r = new SR();
    r.lang = 'zh-CN';
    r.continuous = false;
    r.interimResults = false;

    r.onresult = e => {
        gotResult = true;
        const text = e.results[0][0].transcript;
        resetRecBtn();
        if (text.trim()) processInput(text);
    };

    r.onerror = e => {
        // not-allowed = 没有麦克风权限
        if (e.error === 'not-allowed') {
            addMsg('⚠️ 麦克风权限被拒绝，请在浏览器设置中允许使用麦克风', 'master');
        } else if (e.error === 'no-speech') {
            // 没有说话，静默结束，正常重置
        } else {
            addMsg(`语音识别出错：${e.error}`, 'master');
        }
        resetRecBtn();
    };

    // onend 在 onresult 之后也会触发，只在没有结果时重置
    r.onend = () => {
        if (!gotResult) resetRecBtn();
    };

    return r;
}

function startRec() {
    if (isRecording) return;
    recognition = buildSR();
    if (!recognition) {
        addMsg('⚠️ 此浏览器不支持语音识别，建议使用 Safari（iOS）或 Chrome（Android）', 'master');
        return;
    }
    gotResult = false;
    try {
        recognition.start();
        isRecording = true;
        const btn = document.getElementById('voiceRecordBtn');
        btn.classList.add('recording');
        btn.textContent = '🎙 松手停止';
    } catch(e) {
        addMsg('启动录音失败，请重试', 'master');
        resetRecBtn();
    }
}

function stopRec() {
    if (!isRecording) return;
    // 调用 stop() 后会触发 onend，onend 里判断 gotResult 决定是否重置
    try { recognition && recognition.stop(); } catch(e) {}
}

const vrBtn = document.getElementById('voiceRecordBtn');

// ── 触屏 ──
vrBtn.addEventListener('touchstart', e => {
    e.preventDefault();
    startRec();
}, { passive: false });

vrBtn.addEventListener('touchend', e => {
    e.preventDefault();
    stopRec();
}, { passive: false });

vrBtn.addEventListener('touchcancel', e => {
    e.preventDefault();
    stopRec();
}, { passive: false });

// ── 鼠标（桌面） ──
vrBtn.addEventListener('mousedown', e => { e.preventDefault(); startRec(); });
vrBtn.addEventListener('mouseup',   () => stopRec());
vrBtn.addEventListener('mouseleave',() => { if (isRecording) stopRec(); });

// ═══════════════════════════════════════════
//  初始化
// ═══════════════════════════════════════════
window.addEventListener('load', () => {
    updateStats();
    document.getElementById('configBtn').addEventListener('click', showAiConfigModal);

    if (!aiConfig.apiKey) {
        addMsg('👋 你好！我是乐理大师。点右上角 ⚙️ 配置 AI Key，配置后你可以用任何自然语言告诉我出什么题。', 'master');
        setTimeout(() => addMsg('现在先开始：', 'master'), 600);
    } else {
        addMsg('准备好了，开始：','master');
    }
    setTimeout(askNew, 800);
});
