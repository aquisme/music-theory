<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>乐理大师</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
            background: #f2f2f7;
            overflow: hidden;
            color: #1c1c1e;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
        }

        /* ─── Header ─── */
        .header {
            flex-shrink: 0;
            padding: 14px 20px 10px;
            background: #fff;
            border-bottom: 0.5px solid #e5e5ea;
            text-align: center;
            position: relative;
        }
        .header h1 { font-size: 17px; font-weight: 600; }
        .stats { display: flex; justify-content: center; gap: 8px; margin-top: 5px; }
        .badge { font-size: 12px; color: #8e8e93; background: #f2f2f7; padding: 2px 10px; border-radius: 10px; }
        .badge.good { color: #34c759; }
        .badge.bad  { color: #ff3b30; }
        .config-btn {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px;
            color: #8e8e93;
        }
        .midi-btn {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; font-size: 16px; cursor: pointer; padding: 4px;
            color: #8e8e93; line-height: 1;
        }
        .midi-btn.connected { color: #34c759; }
        .midi-btn.pressed   { color: #007aff; transform: translateY(-50%) scale(1.3); }
        /* MIDI 按键提示气泡 */
        .midi-toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.75); color: #fff;
            padding: 6px 16px; border-radius: 20px; font-size: 15px;
            pointer-events: none; opacity: 0; transition: opacity 0.15s;
            z-index: 999;
        }
        .midi-toast.show { opacity: 1; }

        /* ─── Chat ─── */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 14px 14px 6px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }
        .message {
            max-width: 76%;
            padding: 9px 13px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
            animation: fadeIn .2s ease;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
        .message.master   { background:#f2f2f7; color:#1c1c1e; align-self:flex-start; border-bottom-left-radius:4px; }
        .message.user     { background:#1c1c1e; color:#fff;    align-self:flex-end;   border-bottom-right-radius:4px; }
        .message.correct  { background:#e8f8ef; color:#1a7f45; align-self:flex-start; border-bottom-left-radius:4px; font-weight:500; }
        .message.incorrect{ background:#fff0ef; color:#c0392b; align-self:flex-start; border-bottom-left-radius:4px; font-weight:500; }

        /* ─── Input Area ─── */
        .input-area {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-top: 0.5px solid #e5e5ea;
            background: #fff;
            /* 底部间距由 JS 动态设置，此处仅作 fallback */
        }

        /* 麦克风开关 */
        .mic-toggle {
            flex-shrink: 0;
            width: 38px; height: 38px;
            border-radius: 50%;
            background: #f2f2f7;
            border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 17px;
            transition: background .15s;
        }
        .mic-toggle.on { background: #1c1c1e; }
        .mic-toggle.on .mic-icon path,
        .mic-toggle.on .mic-icon rect { fill: #fff; }
        .mic-toggle.on .mic-icon line,
        .mic-toggle.on .mic-icon path[stroke] { stroke: #fff; }

        /* 文字输入框 */
        .text-input-wrap {
            flex: 1;
            height: 40px;
            border-radius: 20px;
            border: 1.5px solid #e5e5ea;
            background: #f9f9f9;
            overflow: hidden;
            transition: border-color .2s;
        }
        .text-input-wrap:focus-within { border-color: #1c1c1e; background: #fff; }
        input[type="text"] {
            width: 100%; height: 100%;
            padding: 0 14px;
            border: none; background: transparent;
            font-size: 16px; color: #1c1c1e; outline: none; font-family: inherit;
        }
        input[type="text"]::placeholder { color: #aeaeb2; }

        /* 语音录音大按钮（语音模式下替换输入框） */
        .voice-record-btn {
            flex: 1;
            height: 40px;
            border-radius: 20px;
            border: 1.5px solid #e5e5ea;
            background: #f9f9f9;
            font-size: 14px; color: #8e8e93;
            cursor: pointer;
            display: none; /* 默认隐藏，语音模式显示 */
            align-items: center; justify-content: center;
            user-select: none; -webkit-user-select: none;
            touch-action: none;
            transition: background .15s, color .15s, border-color .15s;
        }
        .voice-record-btn.recording {
            background: #fff0ef; border-color: #ff3b30; color: #ff3b30;
        }

        /* 发送按钮 */
        .send-btn {
            flex-shrink: 0;
            width: 38px; height: 38px;
            border-radius: 50%;
            background: #1c1c1e; color: #fff;
            border: none; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity .15s;
        }
        .send-btn:active { opacity: .7; }

        /* 语音模式切换显示 */
        .app.voice-mode .text-input-wrap { display: none; }
        .app.voice-mode .voice-record-btn { display: flex; }

        /* ─── 模式 Tab ─── */
        .mode-tabs {
            flex-shrink: 0;
            display: flex;
            border-bottom: 0.5px solid #e5e5ea;
            background: #fff;
        }
        .mode-tab {
            flex: 1; padding: 9px 0;
            border: none; background: none;
            font-size: 13px; font-weight: 500; color: #8e8e93;
            cursor: pointer; border-bottom: 2px solid transparent;
            transition: color .15s;
        }
        .mode-tab.active { color: #1c1c1e; border-bottom-color: #1c1c1e; }

        /* ─── 指板视图（全屏覆盖） ─── */
        #fretboardView {
            display: none; flex-direction: column;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 100;
            background: #f2f2f7;
            overflow: hidden;
        }
        #fretboardView.active { display: flex; }
        #chatView.hidden { display: none; }

        /* 指板全屏内的顶栏 */
        #fretTopBar {
            flex-shrink: 0;
            display: flex; align-items: center;
            padding: 10px 16px 0;
            background: #fff;
            border-bottom: 0.5px solid #e5e5ea;
        }
        #fretBackBtn {
            border: none; background: none;
            font-size: 14px; color: #007aff;
            cursor: pointer; padding: 6px 10px 6px 0;
            font-weight: 500; white-space: nowrap;
        }
        #fretTopBar .fret-mode-bar {
            flex: 1; overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 8px;
            display: flex; gap: 6px;
        }
        #fretTopBar .fret-mode-bar::-webkit-scrollbar { display: none; }

        /* 控件区固定高度，不拉伸 */
        .fret-controls { flex-shrink: 0; padding: 6px 12px; display: flex; flex-direction: column; gap: 6px; }
        .fret-card-row { display: flex; gap: 8px; align-items: center; }

        /* 指板容器：占满剩余空间 */
        .fretboard-wrap {
            flex: 1 1 0;
            min-height: 0;
            overflow: hidden;
            padding: 0 12px 8px;
        }

        #fretCanvas {
            display: block;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,.3);
            cursor: pointer;
            touch-action: manipulation;
        }

        .fret-mode-bar {
            display: flex; gap: 6px; flex-wrap: nowrap;
        }
        .fret-mode-btn {
            padding: 7px 14px; border-radius: 20px;
            border: 1.5px solid #e5e5ea; background: #fff;
            font-size: 12px; font-weight: 600; color: #3c3c43; cursor: pointer;
            white-space: nowrap;
            transition: all .15s;
        }
        .fret-mode-btn.active {
            background: #1c1c1e; color: #fff; border-color: #1c1c1e;
        }
        /* 题目/状态卡 */
        .fret-question-card {
            background: #fff; border-radius: 10px;
            padding: 8px 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
            font-size: 13px; line-height: 1.4;
            flex: 1;
        }
        .fret-question-card .q-title { font-weight: 600; margin-bottom: 2px; }
        .fret-question-card .q-hint  { font-size: 11px; color: #8e8e93; }
        .fret-question-card .q-result { font-weight: 600; margin-top: 4px; font-size: 12px; }
        .fret-question-card .q-result.ok  { color: #34c759; }
        .fret-question-card .q-result.err { color: #ff3b30; }

        .fret-action-bar {
            display: flex; gap: 6px; align-items: center;
        }
        .fret-action-btn {
            padding: 7px 14px; border-radius: 8px;
            border: none; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
        }
        .fret-action-btn.primary { background: #1c1c1e; color: #fff; }
        .fret-action-btn.secondary { background: #e5e5ea; color: #1c1c1e; }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="header">
        <h1>乐理大师</h1>
        <button class="config-btn" id="configBtn" title="AI 配置">⚙️</button>
        <button class="midi-btn" id="midiBtn" title="MIDI 键盘">🎹</button>
        <div class="stats">
            <span class="badge good">✓ <span id="sc">0</span></span>
            <span class="badge bad">✗ <span id="si">0</span></span>
            <span class="badge">准确率 <span id="sa">—</span></span>
        </div>
    </div>

    <!-- 模式切换 Tab -->
    <div class="mode-tabs">
        <button class="mode-tab active" id="tabChat">💬 对话练习</button>
        <button class="mode-tab" id="tabFret">🎸 指板练习</button>
    </div>

    <!-- 对话视图 -->
    <div class="chat-area" id="chatArea" style="display:flex;flex-direction:column;"></div>

    <!-- 指板视图（全屏覆盖） -->
    <div id="fretboardView">
        <!-- 全屏顶栏 -->
        <div id="fretTopBar">
            <button id="fretBackBtn">← 返回</button>
            <div class="fret-mode-bar">
                <button class="fret-mode-btn active" data-fmode="free">🎵 自由弹奏</button>
                <button class="fret-mode-btn" data-fmode="note">🔍 认识音名</button>
                <button class="fret-mode-btn" data-fmode="interval">🎼 找音程</button>
                <button class="fret-mode-btn" data-fmode="chord">🎸 和弦声部</button>
                <button class="fret-mode-btn" data-fmode="custom">✏️ 自定义</button>
            </div>
        </div>

        <!-- 题目卡 + 操作栏 -->
        <div class="fret-controls" style="padding:10px 16px 0;">
            <!-- 自定义出题输入区（默认隐藏） -->
            <div id="fretCustomInput" style="display:none;background:#fff;border-radius:12px;padding:10px 12px;box-shadow:0 1px 4px rgba(0,0,0,.08);">
                <div style="font-size:13px;color:#3c3c43;font-weight:600;margin-bottom:6px;">说出你想练什么：</div>
                <div style="display:flex;gap:8px;">
                    <input id="fretCustomText" type="text" placeholder="例：找出所有C音 / 找出G弦上的大三度" style="flex:1;padding:8px 10px;border:1.5px solid #e5e5ea;border-radius:8px;font-size:13px;outline:none;" />
                    <button id="fretCustomStart" style="padding:8px 14px;background:#1c1c1e;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;">开始</button>
                </div>
                <div style="font-size:11px;color:#aeaeb2;margin-top:5px;">支持：找出所有X音 · 找X和弦的组成音 · 找X大调第N级音</div>
            </div>
            <div class="fret-card-row">
                <div class="fret-question-card" id="fretCard">
                    <div class="q-title">自由弹奏模式</div>
                    <div class="q-hint">点击任意品格发音，长按显示/隐藏所有音名</div>
                </div>
                <div class="fret-action-bar" id="fretActionBar">
                    <button class="fret-action-btn secondary" id="fretToggleNames">显示音名</button>
                    <button class="fret-action-btn primary" id="fretNextQ" style="display:none">下一题</button>
                    <button class="fret-action-btn primary" id="fretSubmitCustom" style="display:none">提交判断</button>
                </div>
            </div>
        </div>

        <!-- 指板本体（Canvas） -->
        <div class="fretboard-wrap">
            <canvas id="fretCanvas"></canvas>
        </div>
    </div>

    <div class="input-area" id="inputArea">
        <!-- 麦克风开关 -->
        <button class="mic-toggle" id="micToggle" title="语音模式">
            <svg class="mic-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="9" y="2" width="6" height="12" rx="3" fill="#1c1c1e"/>
                <path d="M5 11a7 7 0 0 0 14 0" stroke="#1c1c1e" stroke-width="1.8" stroke-linecap="round"/>
                <line x1="12" y1="18" x2="12" y2="22" stroke="#1c1c1e" stroke-width="1.8" stroke-linecap="round"/>
                <line x1="9" y1="22" x2="15" y2="22" stroke="#1c1c1e" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
        </button>

        <!-- 文字输入框 -->
        <div class="text-input-wrap">
            <input type="text" id="userInput"
                   placeholder="输入答案，或说「换题型」「加难」…"
                   autocomplete="off" autocorrect="off" autocapitalize="off" />
        </div>

        <!-- 语音录音按钮（语音模式专用，替换输入框） -->
        <button class="voice-record-btn" id="voiceRecordBtn">按住说话</button>

        <!-- 发送 -->
        <button class="send-btn" id="sendBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
                <path d="M12 3 L21 20 L12 16 L3 20 Z"/>
            </svg>
        </button>
    </div>
    <div class="midi-toast" id="midiToast"></div>
</div>

<script>
// ═══════════════════════════════════════════
//  底部间距自适应（tiiny广告条 + 安全区）
// ═══════════════════════════════════════════
function setBottomPadding() {
    const safeBottom = parseInt(getComputedStyle(document.documentElement)
        .getPropertyValue('--sab') || '0', 10);

    // tiiny广告条约48px；桌面端不需要额外空间
    const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
    const tinyBar = isMobile ? 52 : 0;
    const safe    = isMobile ? (window.safeAreaBottom || 0) : 0;

    document.getElementById('inputArea').style.paddingBottom =
        (10 + tinyBar + safe) + 'px';
}

// 读取 CSS env(safe-area-inset-bottom) 的实际像素值
const safeDiv = document.createElement('div');
safeDiv.style.cssText = 'position:fixed;bottom:0;height:env(safe-area-inset-bottom,0px);width:0;pointer-events:none;';
document.body.appendChild(safeDiv);
window.addEventListener('load', () => {
    window.safeAreaBottom = safeDiv.offsetHeight || 0;
    document.body.removeChild(safeDiv);
    setBottomPadding();
});
window.addEventListener('resize', setBottomPadding);

// ═══════════════════════════════════════════
//  乐理数据
// ═══════════════════════════════════════════
const CHROMATIC = ['C','#C','D','#D','E','F','#F','G','#G','A','#A','B'];
const SOLMIZATION_TO_NOTE = {
    '1':'C','#1':'#C','b1':'B','2':'D','#2':'#D','b2':'#C',
    '3':'E','#3':'F', 'b3':'#D','4':'F','#4':'#F','b4':'E',
    '5':'G','#5':'#G','b5':'#F','6':'A','#6':'#A','b6':'#G',
    '7':'B','#7':'C', 'b7':'#A'
};
// 等音映射（包含重升等情况）
const ENHARMONIC_FULL = {
    // 单升降
    '#C':'bD','bD':'#C','#D':'bE','bE':'#D','#F':'bG','bG':'#F',
    '#G':'bA','bA':'#G','#A':'bB','bB':'#A',
    // 重升（x / ##）= 午音名
    '##C':'D','xC':'D','##D':'E','xD':'E','##E':'#F','xE':'#F',
    '##F':'G','xF':'G','##G':'A','xG':'A','##A':'B','xA':'B',
    '##B':'#C','xB':'#C',
    // 重降 (bb) = 呢音名
    'bbD':'C','bbE':'D','bbF':'E','bbG':'F','bbA':'G','bbB':'A','bbC':'B'
};

function allEnharmonics(note) {
    const set = new Set([note]);
    // 直接等音
    if (ENHARMONIC_FULL[note]) set.add(ENHARMONIC_FULL[note]);
    // 通过钢琴中音名展开
    for (const [k,v] of Object.entries(ENHARMONIC_FULL)) { if (v===note) set.add(k); }
    // 如果是升号，也加入募小、重升等形式
    return set;
}
const SCALES = {
    '大调':[0,2,4,5,7,9,11],'自然小调':[0,2,3,5,7,8,10],
    '和声小调':[0,2,3,5,7,8,11],'旋律小调':[0,2,3,5,7,9,11],
    '五声音阶':[0,2,4,7,9],'多利亚调式':[0,2,3,5,7,9,10],
    '弗里几亚调式':[0,1,3,5,7,8,10],'利底亚调式':[0,2,4,6,7,9,11],
    '混合利底亚':[0,2,4,5,7,9,10],'洛克里亚调式':[0,1,3,5,6,8,10]
};
const CHORDS = {
    '大三和弦':[0,4,7],'小三和弦':[0,3,7],'减三和弦':[0,3,6],
    '增三和弦':[0,4,8],'挂留四和弦':[0,5,7],
    '属七和弦':[0,4,7,10],'大七和弦':[0,4,7,11],'小七和弦':[0,3,7,10],
    '减七和弦':[0,3,6,9],'半减七和弦':[0,3,6,10],'小大七和弦':[0,3,7,11]
};
const INTERVALS = {
    0:'同度',1:'小二度',2:'大二度',3:'小三度',4:'大三度',
    5:'纯四度',6:'增四度/减五度',7:'纯五度',8:'小六度',
    9:'大六度',10:'小七度',11:'大七度',12:'八度'
};

// ═══════════════════════════════════════════
//  状态
// ═══════════════════════════════════════════
let currentQuestion = null;
let lastQuestionText = null; // 避免重复出题
let difficulty = 2;
let questionType = 'all';
let lockedScales = []; // [{root:'C', type:'大调'}, ...] 锁定多个音阶
let lockedChord = null;  // '属七和弦' 锁定和弦类型
let stats, customQuestions;
try { stats = JSON.parse(localStorage.getItem('musicStats')) || {correct:0,incorrect:0}; } catch(e) { stats = {correct:0,incorrect:0}; }
try { customQuestions = JSON.parse(localStorage.getItem('customQuestions')) || []; } catch(e) { customQuestions = []; }
let voiceMode = false;

// ═══════════════════════════════════════════
//  辅助函数
// ═══════════════════════════════════════════
function getNoteIndex(n) {
    let i = CHROMATIC.indexOf(n);
    if (i !== -1) return i;
    if (n.length === 2 && n[0] === 'b') {
        const b = CHROMATIC.indexOf(n[1].toUpperCase());
        if (b !== -1) return (b - 1 + 12) % 12;
    }
    return 0;
}
const getNoteName = i => CHROMATIC[((i%12)+12)%12];
const transposeNote = (n,s) => getNoteName(getNoteIndex(n)+s);
const getScaleNotes = (r,t) => SCALES[t].map(i=>transposeNote(r,i));
const getChordNotes = (r,t) => CHORDS[t].map(i=>transposeNote(r,i));
const randomNote = () => CHROMATIC[Math.floor(Math.random()*12)];
const randomChoice = a => a[Math.floor(Math.random()*a.length)];

function normToken(t) {
    t = t.trim().replace(/降/g,'b').replace(/升/g,'#');
    // 支持首调唱名：#4、1、b6
    const sm = t.match(/^([#b]?)([1-7])$/);
    if (sm) return SOLMIZATION_TO_NOTE[sm[1]+sm[2]] || t.toUpperCase();
    // 支持音名：[#b]?[A-G]
    const nm = t.match(/^([#b]{0,2})([A-Ga-g])$/);
    if (nm) return nm[1]+nm[2].toUpperCase();
    return t.toUpperCase();
}

// 解析答案字符串：支持有无空格隔开的形式，如 "#4#1#6" 或 "#F #A #C"
function splitAnswer(s) {
    s = s.trim().replace(/降/g,'b').replace(/升/g,'#');
    // 支持 + 分隔符（MIDI 和弦输入格式）
    if (/\+/.test(s)) return s.split(/\s*\+\s*/);
    // 先尝试按空格分割
    if (/\s/.test(s)) return s.split(/\s+/);
    // 无空格：按 [#b]?[A-G1-7] 分割
    const tokens = [];
    const re = /([#b]{0,2})([A-Ga-g]|[1-7])/g;
    let m;
    while ((m = re.exec(s)) !== null) tokens.push(m[1]+(m[2]));
    return tokens.length > 0 ? tokens : [s];
}

function normalizeAnswer(s) {
    return splitAnswer(s).map(normToken).join(' ');
}
// notesEqual 直接复用 allEnharmonics
function notesEqual(a,b) {
    if (a===b) return true;
    const ea = allEnharmonics(a), eb = allEnharmonics(b);
    for (const x of ea) { if (eb.has(x)) return true; }
    // 转换为升号音名后再比对
    const an = SOLMIZATION_TO_NOTE[a]||a, bn = SOLMIZATION_TO_NOTE[b]||b;
    if (an===bn) return true;
    const ean = allEnharmonics(an), ebn = allEnharmonics(bn);
    for (const x of ean) { if (ebn.has(x)) return true; }
    return false;
}
function checkAnswer(raw) {
    if (!currentQuestion) return false;
    const u=normalizeAnswer(raw).split(' '), c=normalizeAnswer(currentQuestion.answer).split(' ');
    if (u.length!==c.length) return false;
    if (u.every((t,i)=>notesEqual(t,c[i]))) return true;
    if (u.length>1) {
        const su=[...u].sort(), sc=[...c].sort();
        if (su.every((t,i)=>notesEqual(t,sc[i]))) return true;
    }
    return false;
}

function generateIntervalQuestion() {
    const note=randomNote(), dir=Math.random()>.5?'上行':'下行';
    const maxI=Math.min(12,2+difficulty*2), semi=Math.floor(Math.random()*maxI)+1;
    const answer=dir==='上行'?transposeNote(note,semi):transposeNote(note,-semi);
    return {question:`${note}${dir}${INTERVALS[semi]||semi+'个半音'}是什么音？`,answer};
}
function generateScaleQuestion() {
    const all=Object.keys(SCALES);
    let root, st;
    if (lockedScales.length > 0) {
        // 从锁定的多个调中随机选一个
        const picked = randomChoice(lockedScales);
        root = picked.root;
        st   = picked.type;
    } else {
        root = randomNote();
        st   = difficulty<=2?'大调':difficulty<=3?randomChoice(['大调','自然小调','和声小调','五声音阶']):randomChoice(all);
    }
    // 锁定模式只出分级题（不重复），未锁定时随机
    if (lockedScales.length > 0 || Math.random() > 0.5) {
        const deg=Math.floor(Math.random()*SCALES[st].length)+1;
        return {question:`${root}${st}第${deg}级音是什么？`,answer:getScaleNotes(root,st)[deg-1]};
    }
    return {question:`${root}${st}的组成音？`,answer:getScaleNotes(root,st).join(' ')};
}
function generateChordQuestion() {
    const all=Object.keys(CHORDS);
    // 如果锁定了和弦类型，始终用锁定的类型
    const ct = lockedChord ? lockedChord
             : difficulty<=2?randomChoice(['大三和弦','小三和弦']):difficulty<=3?randomChoice(['大三和弦','小三和弦','减三和弦','增三和弦','属七和弦']):randomChoice(all);
    const root=randomNote();
    return {question:`${root}${ct}的组成音？`,answer:getChordNotes(root,ct).join(' ')};
}
function generateQuestion() {
    const types=['interval','scale','chord'];
    if (customQuestions.length>0) types.push('custom');
    const type=questionType==='all'?randomChoice(types):questionType;
    let q, attempts = 0;
    do {
        if (type==='interval') q=generateIntervalQuestion();
        else if (type==='scale') q=generateScaleQuestion();
        else if (type==='chord') q=generateChordQuestion();
        else { const c=randomChoice(customQuestions); q={question:c.question,answer:c.answer}; }
        attempts++;
    } while (q.question === lastQuestionText && attempts < 5);
    lastQuestionText = q.question;
    currentQuestion=q; return q.question;
}

// 判断是否是纯音名答案（走本地快速路径，不需要 LLM）
function looksLikePureAnswer(t) {
    // 纯音名/首调音符，格式如：C、#F、bA、1、#4、b6，可多个空格分隔或无分隔
    return /^([#b]{0,2}[A-Ga-g1-7]\s*)+$/.test(t.trim());
}

// 本地快速 regex 兜底（只处理纯音名和极明确的单词指令）
function quickLocalIntent(t) {
    // 换题/跳过
    if (/^(换[一道题个]?|跳过|下一题|next|skip)$/i.test(t)) return {type:'next'};
    // 统计
    if (/^(统计|成绩|正确率)$/.test(t)) return {type:'stats'};
    // 帮助
    if (/^(帮助|help)$/i.test(t)) return {type:'help'};
    // 重置
    if (/^(重置|清空)$/.test(t)) return {type:'reset'};
    return null;
}

// LLM 意图解析
const INTENT_SYSTEM_PROMPT = `你是乐理大师App的意图解析器。用户会发送中文或英文消息，你需要判断用户意图并返回JSON。

可用题型：interval（音程）、scale（音阶/调式）、chord（和弦）、all（随机）

可用和弦：大三和弦、小三和弦、减三和弦、增三和弦、属七和弦、大七和弦、小七和弦、减七和弦、半减七和弦、小大七和弦
音名：C #C D #D E F #F G #G A #A B

返回以下JSON格式之一（不要有其他文字）：

{"type":"qtype","value":"interval"}
{"type":"qtype","value":"scale"}

// ── LLM 生成题目（自由约束）──
const QUESTION_SYSTEM_PROMPT = `你是一个专业乐理老师，负责出题考学生。

出题要求：
1. 出一道单选或填空乐理题，题目要清晰、准确
2. 必须返回JSON格式：{"question":"题目内容","answer":"正确答案"}
3. 答案必须准确，不能有歧义
4. 每次出不同的题，不要重复

音名格式：C #C D #D E F #F G #G A #A B（用#表示升，b表示降）`;

async function callLLMQuestion(constraint, avoidQuestions=[]) {
    if (!aiConfig.apiKey) return null;
    try {
        const avoidHint = avoidQuestions.length > 0
            ? `\n\n注意：以下题目已经出过，不要重复类似的题：\n${avoidQuestions.map((q,i)=>`${i+1}. ${q}`).join('\n')}`
            : '';
        const userPrompt = constraint + avoidHint;
        const resp = await fetch(`${aiConfig.baseUrl}/chat/completions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${aiConfig.apiKey}` },
            body: JSON.stringify({
                model: aiConfig.model,
                messages: [
                    { role: 'system', content: QUESTION_SYSTEM_PROMPT },
                    { role: 'user', content: userPrompt }
                ],
                max_tokens: 300,
                temperature: 0.7
            })
        });
        if (!resp.ok) return null;
        const data = await resp.json();
        const content = data.choices?.[0]?.message?.content?.trim();
        if (!content) return null;
        const jsonMatch = content.match(/\{[\s\S]*\}/);
        if (!jsonMatch) return null;
        return JSON.parse(jsonMatch[0]);
    } catch(e) { return null; }
}

async function callLLMIntent(userText) {
    if (!aiConfig.apiKey) return null;
    try {
        // 构建带状态的 system prompt
        const stateDesc = [
            currentQuestion ? `当前题目：「${currentQuestion.question}」` : '当前无进行中题目',
            lockedScales.length > 0 ? `已锁定音阶（混合出题）：${lockedScales.map(s=>s.root+s.type).join('、')}` : '',
            lockedChord ? `已锁定和弦：${lockedChord}` : '',
            `题型：${questionType}，难度：${difficulty}`
        ].filter(Boolean).join('\n');

        const messages = [
            { role: 'system', content: INTENT_SYSTEM_PROMPT + '\n\n当前应用状态：\n' + stateDesc },
            // 带上最近 8 轮对话历史
            ...conversationHistory.slice(-8),
            { role: 'user', content: userText }
        ];

        const resp = await fetch(`${aiConfig.baseUrl}/chat/completions`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${aiConfig.apiKey}`
            },
            body: JSON.stringify({
                model: aiConfig.model,
                messages,
                max_tokens: 150,
                temperature: 0
            })
        });
        if (!resp.ok) return null;
        const data = await resp.json();
        const content = data.choices?.[0]?.message?.content?.trim();
        if (!content) return null;
        // 提取 JSON
        const jsonMatch = content.match(/\{[\s\S]*\}/);
        if (!jsonMatch) return null;
        return JSON.parse(jsonMatch[0]);
    } catch(e) {
        return null;
    }
}

function handleIntent(intent) {
    const ln=['简单','较易','中等','较难','困难'];
    const tn={all:'全部',interval:'音程',scale:'音阶',chord:'和弦',custom:'自定义'};
    switch(intent.type) {
        case 'difficulty':
            difficulty = Math.max(1, Math.min(5, intent.value));
            addMsg(`难度→${ln[difficulty-1]}，继续：`,'master');
            setTimeout(askNew,400); return true;
        case 'difficultyDelta':
            difficulty = Math.max(1, Math.min(5, difficulty + (intent.delta||0)));
            addMsg(`难度→${ln[difficulty-1]}，继续：`,'master');
            setTimeout(askNew,400); return true;
        case 'qtype':
            questionType=intent.value;
            lockedScales = [];
            lockedChord = null;
            addMsg(`好的，切换到${tn[questionType]}题：`,'master');
            setTimeout(askNew,400); return true;
        case 'next':
            currentQuestion=null; askNew(); return true;
        case 'stats': {
            const tot=stats.correct+stats.incorrect;
            addMsg(`共${tot}题，正确${stats.correct}，正确率${tot>0?Math.round(stats.correct/tot*100):0}%`,'master');
            return true;
        }
        case 'reset':
            if(confirm('重置统计？')){ stats={correct:0,incorrect:0}; updateStats(); addMsg('已重置','master'); }
            return true;
        case 'qtypeChord': {
            questionType = 'chord';
            const ct = intent.chordType;
            if (CHORDS[ct]) {
                lockedChord = ct;
                lockedScales = [];
                addMsg(`好的，将一直出${ct}：`, 'master');
                setTimeout(askNew, 400);
            } else {
                lockedChord = null;
                addMsg(`好的，切换到和弦题！`, 'master');
                setTimeout(askNew, 400);
            }
            return true;
        }
        case 'qtypeFixed': {
            // 锁定一个或多个音阶（替换旧的锁定）
            questionType = 'scale';
            lockedChord = null;
            const scales = intent.scales || (intent.scaleRoot ? [{root: intent.scaleRoot, type: intent.scaleType||'大调'}] : []);
            lockedScales = scales.map(s => ({
                root: s.root || 'C',
                type: SCALES[s.type] ? s.type : '大调'
            }));
            if (lockedScales.length === 0) lockedScales = [{root: randomNote(), type: '大调'}];
            const names = lockedScales.map(s=>s.root+s.type).join('、');
            addMsg(`好的，将混合出${names}的题：`, 'master');
            setTimeout(askNew, 400);
            return true;
        }
        case 'qtypeScaleAdd': {
            // 在现有锁定基础上追加音阶
            questionType = 'scale';
            lockedChord = null;
            const toAdd = intent.scales || (intent.scaleRoot ? [{root: intent.scaleRoot, type: intent.scaleType||'大调'}] : []);
            toAdd.forEach(s => {
                const entry = {root: s.root||'C', type: SCALES[s.type]?s.type:'大调'};
                const exists = lockedScales.some(e=>e.root===entry.root && e.type===entry.type);
                if (!exists) lockedScales.push(entry);
            });
            const names = lockedScales.map(s=>s.root+s.type).join('、');
            addMsg(`好的，现在混合出${names}的题：`, 'master');
            setTimeout(askNew, 400);
            return true;
        }
        case 'answer':
            return false;
        case 'freeQuestion': {
            if (!aiConfig.apiKey) { addMsg('需要配置 AI Key 才能出自由题型。', 'master'); return true; }
            questionType = 'free'; lockedScales = []; lockedChord = null;
            freeConstraint = intent.constraint || intent.topic || '出一道乐理题';
            recentQuestions = [];
            const thinkQ = addMsg('正在出题…', 'master');
            callLLMQuestion(freeConstraint, recentQuestions).then(q => {
                thinkQ.remove();
                if (q && q.question) {
                    currentQuestion = { question: q.question, answer: q.answer, answerType: 'note' };
                    lastQuestionText = q.question;
                    addToRecentQuestions(q.question);
                    addMsg(q.question, 'master');
                } else {
                    addMsg('出题失败，请重试。', 'master');
                }
            });
            return true;
        }
        case 'unknown':
            if (intent.reply) addMsg(intent.reply, 'master');
            return true;
        case 'help':
            addMsg('你可以直接说：\n「考我C大调」「把D大调和G大调混着考我」「再加A大调」「只出属七和弦」「音程题」「简单一点」「加难」「换一题」「统计」\n答案格式：C  #F  bA  或  1  #4  b6','master');
            return true;
        case 'addCustom':
            setTimeout(()=>{
                const q=prompt('题目内容：'); if(!q)return;
                const a=prompt('正确答案：'); if(!a)return;
                customQuestions.push({question:q,answer:a});
                localStorage.setItem('customQuestions',JSON.stringify(customQuestions));
                addMsg('已添加','master');
            },100); return true;
    }
    return false;
}

// 识别纠正意图：“你判断错”“应该是”“不对”等
function detectCorrection(t) {
    if (/判断错了|判错了|你错了|不对|有误|错误|应该是|正确的是|是[#b\w]+不是|纲正|更正|应该/.test(t)) {
        // 尝试从话语中提取用户给出的音名
        const notePattern = /([#bx]+)?([A-Ga-g])|([#b]+)?([1-7])/g;
        const found = [];
        let m;
        while ((m = notePattern.exec(t)) !== null) {
            if (m[1]!==undefined || m[2]) found.push((m[1]||'') + (m[2]||'').toUpperCase());
            else if (m[3]!==undefined || m[4]) found.push((m[3]||'') + (m[4]||''));
        }
        return { type: 'correction', suggestedNote: found[found.length - 1] || null, raw: t };
    }
    return null;
}

// 验证用户纲正是否正确
function handleCorrection(intent) {
    if (!currentQuestion) {
        addMsg('现在没有进行中的题目', 'master'); return true;
    }
    const userNote = intent.suggestedNote ? normToken(intent.suggestedNote) : null;
    const correctNote = normalizeAnswer(currentQuestion.answer);

    if (userNote && notesEqual(userNote, correctNote)) {
        // 用户给的答案与标准答案等音
        addMsg(`${userNote} 和 ${currentQuestion.answer} 是等音，我的答案没有错。下一题：`, 'master');
        setTimeout(askNew, 400);
    } else if (userNote) {
        // 用户提供了具体音名，但实际不等音
        addMsg(`${userNote} 与正确答案 ${currentQuestion.answer} 不等音，我的判断没错。记住了吗？下一题：`, 'master');
        setTimeout(askNew, 400);
    } else {
        // 没有提取到具体音名
        addMsg(`正确答案是 ${currentQuestion.answer}。下一题：`, 'master');
        setTimeout(askNew, 400);
    }
    return true;
}
function addMsg(text, type='master') {
    const area=document.getElementById('chatArea');
    const d=document.createElement('div');
    d.className=`message ${type}`; d.textContent=text;
    area.appendChild(d); area.scrollTop=area.scrollHeight;

}
function updateStats() {
    document.getElementById('sc').textContent=stats.correct;
    document.getElementById('si').textContent=stats.incorrect;
    const tot=stats.correct+stats.incorrect;
    document.getElementById('sa').textContent=tot>0?Math.round(stats.correct/tot*100)+'%':'—';
    localStorage.setItem('musicStats',JSON.stringify(stats));
}
let freeConstraint = ''; // 记住自由出题的约束，以便持续出同类题
let recentQuestions = []; // 最近出过的题目，用于防重复

function addToRecentQuestions(q) {
    recentQuestions.push(q);
    if (recentQuestions.length > 10) recentQuestions.shift(); // 最多记10题
}

function askNew() {
    if (questionType === 'free' && aiConfig.apiKey) {
        const thinkQ = addMsg('出题中…', 'master');
        callLLMQuestion(freeConstraint || '出一道乐理题', recentQuestions).then(q => {
            thinkQ.remove();
            if (q && q.question) {
                currentQuestion = { question: q.question, answer: q.answer, answerType: q.type || 'note' };
                lastQuestionText = q.question;
                addToRecentQuestions(q.question);
                addMsg(q.question, 'master');
            } else {
                addMsg('出题失败，请重试。', 'master');
            }
        });
    } else {
        const q = generateQuestion();
        addToRecentQuestions(q);
        addMsg(q, 'master');
    }
}

async function processInput(text) {
    text=text.trim(); if(!text)return;
    addMsg(text,'user');

    // 1. 纠正意图（本地）
    const correction = detectCorrection(text);
    if (correction) { handleCorrection(correction); return; }

    // 2. 纯音名答案 → 直接判题（不走 LLM，无延迟）
    if (looksLikePureAnswer(text) && currentQuestion) {
        judgeAnswer(text); return;
    }

    // 3. 极明确单词指令 → 本地快速处理
    const quick = quickLocalIntent(text);
    if (quick) { handleIntent(quick); return; }

    // 4. 有 AI Key → 走 LLM 理解（带历史上下文）
    if (aiConfig.apiKey) {
        // 把用户话加入历史
        pushHistory('user', text);

        const thinkingMsg = addMsg('…', 'master');
        const intent = await callLLMIntent(text);
        thinkingMsg.remove();

        if (intent) {
            // 把 LLM 回复也加入历史（以便下次调用时 LLM 能回顾自己的判断）
            pushHistory('assistant', JSON.stringify(intent));

            if (intent.type === 'answer') {
                if (currentQuestion) { judgeAnswer(text); }
                else { askNew(); }
                return;
            }
            if (handleIntent(intent)) return;
        }
        if (!currentQuestion) { askNew(); return; }
        judgeAnswer(text);
        return;
    }

    // 5. 没有 AI Key → 提示配置
    if (!currentQuestion) { askNew(); return; }
    if (/^[#b\d\sA-Ga-g升降]+$/.test(text)) {
        judgeAnswer(text);
    } else {
        addMsg('配置 AI 后我能听懂任何自然语言指令。点击右上角 ⚙️ 配置，或直接输入音名答案。', 'master');
    }
}

function judgeAnswer(text) {
    if (!currentQuestion) return;

    // 标准音名题 → 本地判题
    if (checkAnswer(text)) {
        stats.correct++; addMsg('✓ 正确！', 'correct');
    } else {
        stats.incorrect++; addMsg(`✗ 错误，答案：${currentQuestion.answer}`, 'incorrect');
    }
    updateStats();
    setTimeout(askNew, 900);
}

let recognition = null;
let isRecording = false;
let gotResult = false; // 标记是否已收到识别结果

function resetRecBtn() {
    isRecording = false;
    const btn = document.getElementById('voiceRecordBtn');
    btn.classList.remove('recording');
    btn.textContent = '按住说话';
}

function buildSR() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    const r = new SR();
    r.lang = 'zh-CN';
    r.continuous = false;
    r.interimResults = false;

    r.onresult = e => {
        gotResult = true;
        const text = e.results[0][0].transcript;
        resetRecBtn();
        if (text.trim()) processInput(text);
    };

    r.onerror = e => {
        // not-allowed = 没有麦克风权限
        if (e.error === 'not-allowed') {
            addMsg('⚠️ 麦克风权限被拒绝，请在浏览器设置中允许使用麦克风', 'master');
        } else if (e.error === 'no-speech') {
            // 没有说话，静默结束，正常重置
        } else {
            addMsg(`语音识别出错：${e.error}`, 'master');
        }
        resetRecBtn();
    };

    // onend 在 onresult 之后也会触发，只在没有结果时重置
    r.onend = () => {
        if (!gotResult) resetRecBtn();
    };

    return r;
}

function startRec() {
    if (isRecording) return;
    recognition = buildSR();
    if (!recognition) {
        addMsg('⚠️ 此浏览器不支持语音识别，建议使用 Safari（iOS）或 Chrome（Android）', 'master');
        return;
    }
    gotResult = false;
    try {
        recognition.start();
        isRecording = true;
        const btn = document.getElementById('voiceRecordBtn');
        btn.classList.add('recording');
        btn.textContent = '🎙 松手停止';
    } catch(e) {
        addMsg('启动录音失败，请重试', 'master');
        resetRecBtn();
    }
}

function stopRec() {
    if (!isRecording) return;
    // 调用 stop() 后会触发 onend，onend 里判断 gotResult 决定是否重置
    try { recognition && recognition.stop(); } catch(e) {}
}

const MIDI_NOTE_NAMES = ['C','#C','D','#D','E','F','#F','G','#G','A','#A','B'];
let midiAccess = null;
let midiEnabled = false;

// ── 三种输入模式的状态机 ──
// 同一"帧"（80ms内）到达的音 → 和弦
// 帧与帧之间间隔 < 1500ms   → 连续（音程/音阶）
// 超过 1500ms 无新音         → 提交当前序列

const CHORD_WINDOW  = 80;   // ms：同一帧内视为和弦
const SEQ_TIMEOUT   = 1500; // ms：连续输入超时后提交

let midiCurrentFrame   = [];  // 当前帧内按下的音（用于识别和弦）
let midiSequence       = [];  // 已确认的帧序列，每元素是一帧的音数组
let midiFrameTimer     = null; // 帧收集定时器
let midiSeqTimer       = null; // 连续序列超时定时器

function midiNoteToName(n) { return MIDI_NOTE_NAMES[n % 12]; }

function showMidiToast(text) {
    const t = document.getElementById('midiToast');
    t.textContent = text;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1400);
}

function flashMidiBtn() {
    const btn = document.getElementById('midiBtn');
    btn.classList.add('pressed');
    clearTimeout(btn._pressTimer);
    btn._pressTimer = setTimeout(() => btn.classList.remove('pressed'), 250);
}

function submitMidiSequence() {
    // 把 midiSequence 转成答案字符串
    // 每帧：单音 → 音名；多音（和弦）→ 音名用+连接
    const seq = midiSequence;
    midiSequence = [];
    if (seq.length === 0) return;

    let answer;
    if (seq.length === 1) {
        // 单帧
        const frame = seq[0];
        if (frame.length === 1) {
            answer = frame[0];            // 单音: "C"
        } else {
            answer = frame.join('+');     // 和弦: "C+E+G"
        }
    } else {
        // 多帧（连续弹奏）：每帧一个 token，空格分隔
        // 帧内多音仍用+，方便判题逻辑解析
        answer = seq.map(f => f.length === 1 ? f[0] : f.join('+')).join(' ');
    }

    showMidiToast('🎹 ' + answer);
    processInput(answer);
}

function commitCurrentFrame() {
    if (midiCurrentFrame.length === 0) return;
    // 去重（同一帧可能重复触发同一音）
    const unique = [...new Set(midiCurrentFrame)];
    midiSequence.push(unique);
    midiCurrentFrame = [];
    // 实时显示已收集的序列（给用户反馈）
    const preview = midiSequence.map(f => f.length === 1 ? f[0] : f.join('+')).join(' → ');
    showMidiToast('🎹 ' + preview + ' …');
    // 重置序列超时
    clearTimeout(midiSeqTimer);
    midiSeqTimer = setTimeout(submitMidiSequence, SEQ_TIMEOUT);
}

function handleMidiNoteOn(midiNote) {
    const noteName = midiNoteToName(midiNote);
    flashMidiBtn();

    midiCurrentFrame.push(noteName);

    // 重置帧窗口（在 CHORD_WINDOW 内继续收集同帧音）
    clearTimeout(midiFrameTimer);
    midiFrameTimer = setTimeout(commitCurrentFrame, CHORD_WINDOW);
}

function handleMidiMessage(event) {
    const [status, note, velocity] = event.data;
    const cmd = status & 0xf0;
    if (cmd === 0x90 && velocity > 0) handleMidiNoteOn(note);
    // note off 不处理
}

// 标准调弦（低音弦→高音弦），MIDI 编号
// E2=40, A2=45, D3=50, G3=55, B3=59, E4=64
const GUITAR_OPEN = [40, 45, 50, 55, 59, 64];
const GUITAR_STRING_NAMES = ['E', 'A', 'D', 'G', 'B', 'e'];
const FRET_COUNT = 15;

// 计算某弦某品的音名
function fretNoteName(stringIdx, fret) {
    const midi = GUITAR_OPEN[stringIdx] + fret;
    return CHROMATIC[midi % 12];
}

// 同名异音显示名：黑键返回 "#X/bY"，白键返回音名
const ENHARMONIC_PAIRS = {
    '#C': '#C/bD', '#D': '#D/bE', '#F': '#F/bG',
    '#G': '#G/bA', '#A': '#A/bB'
};
function fretDisplayName(stringIdx, fret) {
    const name = fretNoteName(stringIdx, fret);
    return ENHARMONIC_PAIRS[name] || name;
}

// 计算某弦某品的 MIDI 音符编号
function fretMidi(stringIdx, fret) {
    return GUITAR_OPEN[stringIdx] + fret;
}

let audioCtx = null;

function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

// 模拟吉他音色（卡尔普斯-斯特朗算法）
function playGuitarNote(midiNote, duration = 1.8) {
    const ctx = getAudioCtx();
    const freq = 440 * Math.pow(2, (midiNote - 69) / 12);
    const bufSize = Math.floor(ctx.sampleRate / freq);
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;

    let y = new Float32Array(bufSize);
    for (let i = 0; i < bufSize; i++) y[i] = data[i];

    const scriptNode = ctx.createScriptProcessor(2048, 0, 1);
    let pos = 0;
    scriptNode.onaudioprocess = (e) => {
        const out = e.outputBuffer.getChannelData(0);
        for (let i = 0; i < out.length; i++) {
            out[i] = y[pos % bufSize];
            y[pos % bufSize] = 0.996 * (y[pos % bufSize] + y[(pos + 1) % bufSize]) / 2;
            pos++;
        }
    };

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.5, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

    scriptNode.connect(gain);
    gain.connect(ctx.destination);

    setTimeout(() => {
        try { scriptNode.disconnect(); gain.disconnect(); } catch(e) {}
    }, duration * 1000 + 100);
}

// ── Canvas 指板核心参数 ──
// 真实吉他品格比例：第 f 品的宽度 ∝ scale_length × (2^(-f/12) - 2^(-(f+1)/12))
// 以第1品宽度为基准，每品宽度 = 前一品 × 2^(-1/12)
const FRET_RATIO = Math.pow(2, -1/12); // ≈ 0.9439

// 计算各品的相对宽度（归一化，总和=1）
function computeFretWidths(count) {
    const widths = [];
    let w = 1;
    for (let f = 1; f <= count; f++) {
        widths.push(w);
        w *= FRET_RATIO;
    }
    const total = widths.reduce((a, b) => a + b, 0);
    return widths.map(x => x / total); // 归一化
}

const FB = {
    nutW: 38,       // 弦名区宽度（含空弦点击区）
    strH: 44,       // 每弦高度（动态计算后覆盖）
    numH: 22,       // 品格编号行高
    dotH: 20,       // 标记点行高
    dotR: 7,        // 标记圆半径
    noteR: 13,      // 音名圆半径
    // 品格绝对宽度数组（在 buildFretboard 时按容器宽度计算）
    _fretWidths: [],  // 长度 FRET_COUNT，索引0对应第1品
    _fretX: [],       // 每品左边 x（从 nutW 开始）
    _boardW: 0,       // 指板宽度（不含弦名区）
    get totalW() { return this.nutW + this._boardW; },
    get totalH() { return this.numH + 6 * this.strH + this.dotH; },
    get boardTop() { return this.numH; },
    get boardBot() { return this.numH + 6 * this.strH; },
    get dotRowTop() { return this.numH + 6 * this.strH; },
    // 第 f 品（1-indexed）的中心 x
    fretCX(f) {
        if (f < 1 || f > FRET_COUNT) return this.nutW;
        return this.nutW + this._fretX[f-1] + this._fretWidths[f-1] / 2;
    },
    // 第 f 品左边界 x
    fretLeft(f) { return f < 1 ? 0 : this.nutW + this._fretX[f-1]; },
    // 弦 s（0=低E, 5=高E）的中心 y（视觉上高E在上）
    strCY(s) { return this.boardTop + (5 - s) * this.strH + this.strH / 2; },
    // 根据 x 坐标找品格（返回 1-based fret，0=空弦区）
    xToFret(x) {
        if (x < this.nutW) return 0; // 空弦区
        const bx = x - this.nutW;
        for (let f = 1; f <= FRET_COUNT; f++) {
            if (bx < this._fretX[f-1] + this._fretWidths[f-1]) return f;
        }
        return FRET_COUNT;
    },
};

function initFBLayout() {
    const availW = window.innerWidth - 24;
    FB._boardW = Math.max(availW - FB.nutW, 300);
    const relWidths = computeFretWidths(FRET_COUNT);
    FB._fretWidths = relWidths.map(r => r * FB._boardW);
    FB._fretX = [];
    let x = 0;
    for (let f = 0; f < FRET_COUNT; f++) {
        FB._fretX.push(x);
        x += FB._fretWidths[f];
    }
    FB._boardW = x;

    // 计算可用高度：窗口高度 - 顶栏 - 控件区（不含 wrap 本身）
    const topBar  = document.getElementById('fretTopBar');
    const controls = document.querySelector('#fretboardView .fret-controls');
    const topH = topBar    ? topBar.offsetHeight    : 50;
    const ctrlH = controls ? controls.offsetHeight  : 80;
    const wrapH = window.innerHeight - topH - ctrlH - 16; // 16 = padding bottom

    const calcStrH = Math.floor((wrapH - FB.numH - FB.dotH) / 6);
    FB.strH = Math.max(28, Math.min(160, calcStrH));
}

const DPR = window.devicePixelRatio || 1;

function buildFretboard() {
    // 用 rAF 确保 DOM 已 layout，才能正确读取控件高度
    requestAnimationFrame(() => {
        initFBLayout();
        const canvas = document.getElementById('fretCanvas');
        canvas.width  = Math.round(FB.totalW * DPR);
        canvas.height = Math.round(FB.totalH * DPR);
        canvas.style.width  = Math.round(FB.totalW) + 'px';
        canvas.style.height = Math.round(FB.totalH) + 'px';
        const ctx = canvas.getContext('2d');
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        drawFretboard();
    });
}

// 所有标注数据（key="s-f" → {color, label}）
let fretDotData = {}; // 由 renderFretDots / setFretboardMode 设置

function drawFretboard() {
    const canvas = document.getElementById('fretCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, FB.totalW, FB.totalH);

    // ── 品格编号行（上方） ──
    ctx.font = '10px -apple-system, sans-serif';
    ctx.fillStyle = '#8e8e93';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let f = 1; f <= FRET_COUNT; f++) {
        ctx.fillText(String(f), FB.fretCX(f), FB.numH / 2);
    }

    // ── 指板底色（木纹渐变） ──
    const grad = ctx.createLinearGradient(FB.nutW, 0, FB.totalW, 0);
    grad.addColorStop(0,   '#6b4423');
    grad.addColorStop(0.5, '#5c3d1e');
    grad.addColorStop(1,   '#4a2f15');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(FB.nutW, FB.boardTop, FB._boardW, 6 * FB.strH, [0, 4, 4, 0]);
    ctx.fill();

    // ── 弦名区（左侧，含空弦点击区） ──
    ctx.fillStyle = '#3a2510';
    ctx.fillRect(0, FB.boardTop, FB.nutW, 6 * FB.strH);

    // 枕（nut）竖线
    ctx.strokeStyle = '#e8d09a';
    ctx.lineWidth = 5;
    ctx.lineCap = 'butt';
    ctx.beginPath();
    ctx.moveTo(FB.nutW, FB.boardTop);
    ctx.lineTo(FB.nutW, FB.boardBot);
    ctx.stroke();

    // ── 品格竖线（变宽） ──
    for (let f = 1; f <= FRET_COUNT; f++) {
        const x = FB.nutW + FB._fretX[f-1] + FB._fretWidths[f-1]; // 右边界
        const lg = ctx.createLinearGradient(x - 1, 0, x + 2, 0);
        lg.addColorStop(0, '#9a7010');
        lg.addColorStop(0.4, '#f0d080');
        lg.addColorStop(1, '#9a7010');
        ctx.strokeStyle = lg;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x, FB.boardTop + 1);
        ctx.lineTo(x, FB.boardBot - 1);
        ctx.stroke();
    }

    // ── 弦线 ──
    const stringThickness = [3.2, 2.6, 2.1, 1.5, 1.0, 0.7]; // 低E→高E
    for (let s = 0; s <= 5; s++) {
        const y = FB.strCY(s);
        const thick = stringThickness[s];
        const sg = ctx.createLinearGradient(0, y - thick, 0, y + thick);
        sg.addColorStop(0, 'rgba(255,240,180,0.45)');
        sg.addColorStop(0.4, 'rgba(220,200,140,0.92)');
        sg.addColorStop(1, 'rgba(180,160,100,0.55)');
        ctx.strokeStyle = sg;
        ctx.lineWidth = thick;
        ctx.beginPath();
        ctx.moveTo(0, y);      // 从弦名区起始（含空弦）
        ctx.lineTo(FB.totalW, y);
        ctx.stroke();
    }

    // ── 弦名（左侧，可点击触发空弦音） ──
    ctx.font = 'bold 11px -apple-system, sans-serif';
    ctx.fillStyle = '#ffe0a0';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const nameOrder = ['e','B','G','D','A','E']; // 从上到下（高E→低E）
    for (let row = 0; row < 6; row++) {
        const y = FB.boardTop + row * FB.strH + FB.strH / 2;
        ctx.fillText(nameOrder[row], FB.nutW / 2, y);
    }

    // ── 指板标记点行（下方） ──
    ctx.fillStyle = '#2e1e0a';
    ctx.fillRect(0, FB.dotRowTop, FB.totalW, FB.dotH);

    const MARKER_FRETS_SINGLE = [3, 5, 7, 9, 15];
    const MARKER_FRETS_DOUBLE = [12];

    ctx.fillStyle = '#c8a96e';
    for (const f of MARKER_FRETS_SINGLE) {
        if (f > FRET_COUNT) continue;
        ctx.beginPath();
        ctx.arc(FB.fretCX(f), FB.dotRowTop + FB.dotH / 2, FB.dotR, 0, Math.PI * 2);
        ctx.fill();
    }
    for (const f of MARKER_FRETS_DOUBLE) {
        if (f > FRET_COUNT) continue;
        const cx = FB.fretCX(f);
        const cy = FB.dotRowTop + FB.dotH / 2;
        const gap = FB.dotR * 1.4;
        ctx.beginPath(); ctx.arc(cx - gap, cy, FB.dotR * 0.82, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx + gap, cy, FB.dotR * 0.82, 0, Math.PI * 2); ctx.fill();
    }

    // ── 音名标注圆点 ──
    drawNoteDots(ctx);
}

function drawNoteDots(ctx) {
    if (fretMode === 'free' && showAllNames) {
        for (let s = 0; s <= 5; s++) {
            for (let f = 0; f <= FRET_COUNT; f++) {
                drawSingleDot(ctx, s, f, fretDisplayName(s, f), 'free');
            }
        }
        return;
    }

    // 题目模式标注
    Object.entries(fretDotData).forEach(([key, d]) => {
        const [s, f] = key.split('-').map(Number);
        drawSingleDot(ctx, s, f, d.label, d.color);
    });

    // 自定义模式：用户已选格子
    if (fretMode === 'custom' && fretQuestion && !fretQuestion.done) {
        customClicked.forEach(key => {
            if (fretDotData[key]) return; // 已被结果覆盖
            const [s, f] = key.split('-').map(Number);
            drawSingleDot(ctx, s, f, fretNoteName(s, f), 'target');
        });
    }
}

const DOT_COLORS = {
    free:    { bg: '#ffffff', text: '#1c1c1e', stroke: 'rgba(0,0,0,.3)' },
    correct: { bg: '#34c759', text: '#ffffff', stroke: null },
    wrong:   { bg: '#ff3b30', text: '#ffffff', stroke: null },
    target:  { bg: '#007aff', text: '#ffffff', stroke: null },
    hint:    { bg: '#ff9500', text: '#ffffff', stroke: null },
};

function drawSingleDot(ctx, s, f, label, colorKey) {
    // f=0 空弦：显示在弦名区中心
    const cx = f === 0 ? FB.nutW / 2 : FB.fretCX(f);
    const cy = FB.strCY(s);
    const c  = DOT_COLORS[colorKey] || DOT_COLORS.free;

    // 根据文字长度决定用圆还是胶囊形
    const isLong = label.length > 2; // e.g. "#A/bB"
    const fontSize = isLong ? 8 : (label.length > 1 ? 9 : 11);
    ctx.font = `bold ${fontSize}px -apple-system, sans-serif`;
    const textW = ctx.measureText(label).width;
    const r = FB.noteR;
    const hw = isLong ? Math.max(r, textW / 2 + 5) : r; // half-width of capsule

    // 画胶囊/圆
    ctx.beginPath();
    if (hw > r) {
        // 胶囊形（圆角矩形）
        const rr = r;
        const x0 = cx - hw, y0 = cy - rr, w = hw * 2, h = rr * 2;
        ctx.moveTo(x0 + rr, y0);
        ctx.lineTo(x0 + w - rr, y0);
        ctx.arcTo(x0 + w, y0, x0 + w, y0 + h, rr);
        ctx.lineTo(x0 + w, y0 + h - rr);
        ctx.arcTo(x0 + w, y0 + h, x0, y0 + h, rr);
        ctx.lineTo(x0 + rr, y0 + h);
        ctx.arcTo(x0, y0 + h, x0, y0, rr);
        ctx.lineTo(x0, y0 + rr);
        ctx.arcTo(x0, y0, x0 + rr, y0, rr);
        ctx.closePath();
    } else {
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
    }
    ctx.fillStyle = c.bg;
    ctx.fill();
    if (c.stroke) {
        ctx.strokeStyle = c.stroke;
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    ctx.fillStyle = c.text;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, cx, cy + 0.5);
}

function getFretCell(s, f) { return null; } // Canvas 模式下不用
function addNoteDot(cell, name, cls) {}     // Canvas 模式下不用（兼容旧调用）

function onCanvasClick(e) {
    const canvas = document.getElementById('fretCanvas');
    const rect = canvas.getBoundingClientRect();
    // 映射到 CSS 像素坐标（canvas 可能被 DPR 缩放，但 style 宽高是 CSS 像素）
    const scaleX = FB.totalW / rect.width;
    const scaleY = FB.totalH / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top)  * scaleY;

    // 判断在指板行内
    if (y < FB.boardTop || y > FB.boardBot) return;

    const row = Math.floor((y - FB.boardTop) / FB.strH);
    const s = 5 - row; // 0=低E, 5=高E

    // 判断品格（0=空弦区，即左侧弦名区）
    const f = x < FB.nutW ? 0 : FB.xToFret(x);
    if (f < 0 || f > FRET_COUNT) return;

    // 播放音频
    playGuitarNote(fretMidi(s, f));

    if (fretMode === 'free') {
        if (!showAllNames) {
            if (window._fretTempTimer) clearTimeout(window._fretTempTimer);
            if (window._fretTempKey) delete fretDotData[window._fretTempKey];

            const key = `${s}-${f}`;
            fretDotData[key] = { label: fretDisplayName(s, f), color: 'free' };
            window._fretTempKey = key;
            drawFretboard();
            window._fretTempTimer = setTimeout(() => {
                delete fretDotData[key];
                window._fretTempKey = null;
                drawFretboard();
            }, 1000);
        }
        return;
    }

    if (!fretQuestion || fretQuestion.done) return;
    handleFretAnswer(s, f);
}

function renderFretDots() {
    fretDotData = {};
    if (fretQuestion && fretQuestion.marked) {
        fretQuestion.marked.forEach(({s, f, state}) => {
            fretDotData[`${s}-${f}`] = { label: fretNoteName(s, f), color: state };
        });
    }
    drawFretboard();
}


function setFretboardMode(mode) {
    const card = document.getElementById('fretCard');
    const nextBtn = document.getElementById('fretNextQ');
    const toggleBtn = document.getElementById('fretToggleNames');
    const submitBtn = document.getElementById('fretSubmitCustom');
    const customInput = document.getElementById('fretCustomInput');
    fretQuestion = null;
    fretDotData = {};
    drawFretboard();

    // 隐藏所有操作按钮先
    nextBtn.style.display = 'none';
    toggleBtn.style.display = 'none';
    submitBtn.style.display = 'none';
    customInput.style.display = 'none';

    if (mode === 'free') {
        card.innerHTML = `<div class="q-title">🎵 自由弹奏</div><div class="q-hint">点击任意品格发音 · 点「显示音名」查看全指板音名</div>`;
        toggleBtn.style.display = '';
    } else if (mode === 'custom') {
        card.innerHTML = `<div class="q-title">✏️ 自定义练习</div><div class="q-hint">输入你想练习的内容，系统帮你判断</div>`;
        customInput.style.display = '';
    } else {
        nextBtn.style.display = '';
        generateFretQuestion(mode);
    }
}

// ── 出题逻辑 ──
function generateFretQuestion(mode) {
    fretQuestion = null;
    fretDotData = {};
    drawFretboard();
    const card = document.getElementById('fretCard');

    if (mode === 'note') {
        // 认识音名：找出指板上前N品内的某个音
        const targetNote = CHROMATIC[Math.floor(Math.random() * 12)];
        const maxFret = difficulty <= 2 ? 5 : difficulty <= 3 ? 9 : 12;
        // 找出所有目标格子
        const targets = [];
        for (let s = 0; s <= 5; s++)
            for (let f = 0; f <= maxFret; f++)
                if (fretNoteName(s, f) === targetNote) targets.push({s, f});

        fretQuestion = {
            mode: 'note',
            targetNote,
            maxFret,
            targets,
            found: new Set(),
            marked: [],
            done: false
        };
        card.innerHTML = `<div class="q-title">找出所有 <b>${targetNote}</b></div>
            <div class="q-hint">点击前 ${maxFret} 品内所有 ${targetNote} 音的位置（共 ${targets.length} 个）</div>
            <div class="q-result" id="fretResult"></div>`;

    } else if (mode === 'interval') {
        // 音程：从某个音出发，找指定音程的目标音
        const notes = CHROMATIC;
        const rootNote = notes[Math.floor(Math.random() * 12)];
        const intervals = [
            {name:'大二度', semi:2}, {name:'小三度', semi:3}, {name:'大三度', semi:4},
            {name:'纯四度', semi:5}, {name:'纯五度', semi:7}, {name:'大六度', semi:9},
            {name:'小七度', semi:10}, {name:'大七度', semi:11}, {name:'纯八度', semi:12}
        ];
        const intv = intervals[Math.floor(Math.random() * intervals.length)];
        const targetNote = notes[(notes.indexOf(rootNote) + intv.semi) % 12];

        // 在指板上标出根音位置（随机选一个）
        const roots = [];
        for (let s = 0; s <= 5; s++)
            for (let f = 0; f <= 12; f++)
                if (fretNoteName(s, f) === rootNote) roots.push({s, f});
        const root = roots[Math.floor(Math.random() * roots.length)];

        // 找目标音
        const targets = [];
        for (let s = 0; s <= 5; s++)
            for (let f = 0; f <= 12; f++)
                if (fretNoteName(s, f) === targetNote) targets.push({s, f});

        fretQuestion = {
            mode: 'interval',
            rootNote, targetNote, root,
            targets,
            found: new Set(),
            marked: [{s: root.s, f: root.f, state: 'hint'}],
            done: false
        };
        // 显示根音橙色提示
        fretDotData = {};
        fretDotData[`${root.s}-${root.f}`] = { label: rootNote, color: 'hint' };
        drawFretboard();
        card.innerHTML = `<div class="q-title">从 <b>${rootNote}</b>（橙色）出发，找出所有 <b>${intv.name}</b> 的音</div>
            <div class="q-hint">目标音：<b>${targetNote}</b>（共 ${targets.length} 个位置）</div>
            <div class="q-result" id="fretResult"></div>`;

    } else if (mode === 'chord') {
        // 和弦声部：找原位三和弦的组成音
        const CHORD_TYPES = [
            {name:'大三和弦', semis:[0,4,7]},
            {name:'小三和弦', semis:[0,3,7]},
            {name:'属七和弦', semis:[0,4,7,10]},
            {name:'大七和弦', semis:[0,4,7,11]},
            {name:'减三和弦', semis:[0,3,6]},
        ];
        const ct = CHORD_TYPES[Math.floor(Math.random() * (difficulty <= 2 ? 2 : CHORD_TYPES.length))];
        const rootNote = CHROMATIC[Math.floor(Math.random() * 12)];
        const rootIdx = CHROMATIC.indexOf(rootNote);
        const chordNotes = ct.semis.map(s => CHROMATIC[(rootIdx + s) % 12]);

        // 找指板上所有组成音的位置
        const targets = [];
        for (let s = 0; s <= 5; s++)
            for (let f = 0; f <= 12; f++)
                if (chordNotes.includes(fretNoteName(s, f)))
                    targets.push({s, f, note: fretNoteName(s, f)});

        fretQuestion = {
            mode: 'chord',
            chordNotes,
            targets,
            found: new Set(),
            marked: [],
            done: false,
            ct
        };
        card.innerHTML = `<div class="q-title">找出 <b>${rootNote}${ct.name}</b> 的所有组成音</div>
            <div class="q-hint">组成音：${chordNotes.join('  ')} · 点击指板上所有这些音的位置</div>
            <div class="q-result" id="fretResult"></div>`;
    }
}

function handleFretAnswer(s, f) {
    if (!fretQuestion || fretQuestion.done) return;
    const q = fretQuestion;

    // 自定义模式：只记录点击，不实时判断，支持点击取消
    if (q.mode === 'custom') {
        const key = `${s}-${f}`;
        if (customClicked.has(key)) {
            customClicked.delete(key);
        } else {
            customClicked.add(key);
        }
        drawFretboard(); // 重绘 canvas
        return;
    }

    const key = `${s}-${f}`;
    if (q.found.has(key)) return;

    const clickedNote = fretNoteName(s, f);
    let correct = false;

    if (q.mode === 'note') {
        correct = clickedNote === q.targetNote && f <= q.maxFret;
    } else if (q.mode === 'interval') {
        correct = clickedNote === q.targetNote && !(s === q.root.s && f === q.root.f);
    } else if (q.mode === 'chord') {
        correct = q.chordNotes.includes(clickedNote);
    }

    q.found.add(key);
    const state = correct ? 'correct' : 'wrong';
    q.marked.push({s, f, state});
    // 更新 fretDotData 并重绘
    fretDotData[`${s}-${f}`] = { label: fretNoteName(s, f), color: state };
    drawFretboard();

    if (!correct) { stats.incorrect++; updateStats(); return; }
    stats.correct++;
    updateStats();

    const foundTargets = q.targets.filter(t => q.found.has(`${t.s}-${t.f}`));
    const resultEl = document.getElementById('fretResult');

    if (foundTargets.length >= q.targets.length) {
        q.done = true;
        if (resultEl) { resultEl.className = 'q-result ok'; resultEl.textContent = `✓ 全部找对了！共 ${q.targets.length} 个位置`; }
    } else {
        if (resultEl) { resultEl.className = 'q-result'; resultEl.style.color = '#007aff'; resultEl.textContent = `找到 ${foundTargets.length} / ${q.targets.length} 个`; }
    }
}

// ── 自定义题目模式 ──
let customClicked = new Set();

function parseCustomQuestion(text) {
    text = text.trim().replace(/升/g,'#').replace(/降/g,'b');

    // 规则1：找出所有X音
    const noteMatch = text.match(/找.*?([#b]?[A-Ga-g])音/);
    if (noteMatch) {
        let n = noteMatch[1][0].toUpperCase() + noteMatch[1].slice(1);
        const found = CHROMATIC.find(c => c === n);
        if (found) {
            const targets = [];
            for (let s = 0; s <= 5; s++)
                for (let f = 0; f <= FRET_COUNT; f++)
                    if (fretNoteName(s, f) === found) targets.push({s, f, note: found});
            return { title: `找出所有 <b>${found}</b> 音`, hint: `共 ${targets.length} 个位置，点完后提交`, targets };
        }
    }

    // 规则2：X和弦组成音
    const chordMatch = text.match(/([#b]?[A-Ga-g])\s*(大三|小三|属七|大七|小七|减三|增三|减七|半减七)/);
    if (chordMatch) {
        const rootRaw = chordMatch[1][0].toUpperCase() + chordMatch[1].slice(1);
        const root = CHROMATIC.find(c => c === rootRaw);
        const typeMap = {'大三':[0,4,7],'小三':[0,3,7],'属七':[0,4,7,10],'大七':[0,4,7,11],'小七':[0,3,7,10],'减三':[0,3,6],'增三':[0,4,8],'减七':[0,3,6,9],'半减七':[0,3,6,10]};
        const semis = typeMap[chordMatch[2]];
        if (root && semis) {
            const rootIdx = CHROMATIC.indexOf(root);
            const chordNotes = semis.map(i => CHROMATIC[(rootIdx + i) % 12]);
            const targets = [];
            for (let s = 0; s <= 5; s++)
                for (let f = 0; f <= FRET_COUNT; f++)
                    if (chordNotes.includes(fretNoteName(s, f))) targets.push({s, f, note: fretNoteName(s, f)});
            return { title: `找出 <b>${root}${chordMatch[2]}和弦</b> 的组成音`, hint: `组成音：${chordNotes.join('  ')}，共 ${targets.length} 个位置`, targets };
        }
    }

    // 规则3：X大调/小调第N级音
    const scaleMatch = text.match(/([#b]?[A-Ga-g])\s*(大调|自然小调|小调).*?第?\s*([1-7])\s*级?/);
    if (scaleMatch) {
        const rootRaw = scaleMatch[1][0].toUpperCase() + scaleMatch[1].slice(1);
        const root = CHROMATIC.find(c => c === rootRaw);
        const scaleType = scaleMatch[2] === '小调' ? '自然小调' : scaleMatch[2];
        const deg = parseInt(scaleMatch[3]);
        const scalesMap = {'大调':[0,2,4,5,7,9,11],'自然小调':[0,2,3,5,7,8,10]};
        const semis = scalesMap[scaleType];
        if (root && semis && deg >= 1 && deg <= 7) {
            const targetNote = CHROMATIC[(CHROMATIC.indexOf(root) + semis[deg-1]) % 12];
            const targets = [];
            for (let s = 0; s <= 5; s++)
                for (let f = 0; f <= FRET_COUNT; f++)
                    if (fretNoteName(s, f) === targetNote) targets.push({s, f, note: targetNote});
            return { title: `找出 <b>${root}${scaleType}</b> 第${deg}级音`, hint: `共 ${targets.length} 个位置，找完后提交`, targets };
        }
    }

    return null;
}

function startCustomFretQuestion() {
    const text = document.getElementById('fretCustomText').value;
    if (!text.trim()) return;
    const parsed = parseCustomQuestion(text);
    const card = document.getElementById('fretCard');
    const submitBtn = document.getElementById('fretSubmitCustom');

    if (!parsed) {
        card.innerHTML = `<div class="q-title">✏️ 自定义练习</div>
            <div class="q-hint" style="color:#ff3b30;">无法解析，请试试：<br>「找出所有C音」「C大三和弦组成音」「C大调第5级音」</div>`;
        return;
    }

    customClicked = new Set();
    fretQuestion = { mode: 'custom', parsed, done: false };
    fretDotData = {};
    drawFretboard();

    card.innerHTML = `<div class="q-title">${parsed.title}</div>
        <div class="q-hint">${parsed.hint}</div>
        <div class="q-hint" style="margin-top:4px;color:#007aff;">点选正确位置（再点可取消），完成后提交</div>
        <div class="q-result" id="fretResult"></div>`;

    submitBtn.textContent = '提交判断';
    submitBtn.onclick = submitCustomFretAnswer;
    submitBtn.style.display = '';
    document.getElementById('fretCustomInput').style.display = 'none';
}

function submitCustomFretAnswer() {
    if (!fretQuestion || fretQuestion.mode !== 'custom') return;
    const targets = fretQuestion.parsed.targets;
    const targetKeys = new Set(targets.map(t => `${t.s}-${t.f}`));
    const clicked = [...customClicked];
    const correct = clicked.filter(k => targetKeys.has(k));
    const missed  = targets.filter(t => !customClicked.has(`${t.s}-${t.f}`));
    const wrong   = clicked.filter(k => !targetKeys.has(k));

    document.querySelectorAll('.note-dot').forEach(d => d.remove());
    fretDotData = {};
    correct.forEach(key => { const [s,f]=key.split('-').map(Number); fretDotData[key]={label:fretNoteName(s,f),color:'correct'}; });
    wrong.forEach(key   => { const [s,f]=key.split('-').map(Number); fretDotData[key]={label:fretNoteName(s,f),color:'wrong'}; });
    missed.forEach(t    => { fretDotData[`${t.s}-${t.f}`]={label:t.note,color:'target'}; });
    drawFretboard();

    fretQuestion.done = true;
    const total = targets.length;
    const resultEl = document.getElementById('fretResult');
    const submitBtn = document.getElementById('fretSubmitCustom');

    if (!wrong.length && !missed.length) {
        resultEl.className = 'q-result ok';
        resultEl.textContent = `✓ 完美！全部 ${total} 个位置都找对了！`;
        stats.correct += total;
    } else {
        resultEl.className = 'q-result err';
        resultEl.textContent = `找对 ${correct.length}/${total}${missed.length?'，漏了'+missed.length+'个（蓝色）':''}${wrong.length?'，多点了'+wrong.length+'个（红色）':''}`;
        stats.correct += correct.length;
        stats.incorrect += wrong.length + missed.length;
    }
    updateStats();

    submitBtn.textContent = '再试一次';
    submitBtn.onclick = () => {
        customClicked = new Set();
        fretDotData = {};
        fretQuestion.done = false;
        resultEl.textContent = '';
        drawFretboard();
        submitBtn.textContent = '提交判断';
        submitBtn.onclick = submitCustomFretAnswer;
    };
}
</script>
</body>
